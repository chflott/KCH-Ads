var catColors={'Bidding Strategy':{bg:'#fce7f3',color:'#9d174d'},'Budget':{bg:'#fffbeb',color:'#78350f'},'Keywords':{bg:'#f0faf5',color:'#155e3e'},'Negative Keywords':{bg:'#f0faf5',color:'#155e3e'},'Ad Copy':{bg:'#eff4ff',color:'#1e3a8a'},'Landing Page':{bg:'#eff4ff',color:'#1e3a8a'},'Targeting':{bg:'#fff5f5',color:'#991b1b'},'Conversion Tracking':{bg:'#fce7f3',color:'#9d174d'},'Ad Schedule':{bg:'#fffbeb',color:'#78350f'},'Other':{bg:'#f5f3ef',color:'var(--muted)'}};

function setChangeDateDefault(){
  var el=document.getElementById('cl-date');if(!el)return;
  var t=new Date();
  el.value=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
}

function wireCLButtons(camp){
  var aiBtn = document.getElementById('cl-ai-btn');
  if(aiBtn) aiBtn.addEventListener('click', getChangeAI);
}

async function getChangeAI(){
  var camp = getCamp(activeCampId);
  if(!camp || !camp.changes || camp.changes.length === 0){
    alert('Log a change first.');
    return;
  }
  var btn     = document.getElementById('cl-ai-btn');
  var loading = document.getElementById('cl-ai-loading');
  var output  = document.getElementById('cl-ai-output');
  btn.style.display = 'none';
  loading.style.display = 'block';
  output.style.display = 'none';

  var latest = camp.changes[0];
  var days   = getDaysFor(camp.resetDate);
  var log    = (camp.perfLog || []).slice(-7).map(function(e){
    var cpl = e.leads > 0 ? '$'+Math.round(e.spend/e.leads) : 'no leads';
    return e.date+': '+e.impr+' impr, '+e.clicks+' clicks, $'+e.spend.toFixed(0)+' spend, '+e.leads+' leads, CPL '+cpl;
  }).join('\n') || 'No performance data logged yet.';

  var prevChanges = camp.changes.slice(1, 4).map(function(c){
    return c.date+': ['+c.cat+'] '+c.what;
  }).join('\n') || 'None';

  var prompt = 'You are a Google Ads strategist advising Kansas City Hardscapes, a premium hardscape contractor in KC metro. $50K average project, $'+camp.budget+'/day budget. Currently Day '+days+' of a learning phase recovery (reset March 2 2026). Buyers are high-income homeowners in Johnson County.\n\n'
    + 'THE CHANGE JUST LOGGED:\n'
    + 'Date: '+latest.date+'\n'
    + 'Category: '+latest.cat+'\n'
    + 'What: '+latest.what+'\n'
    + 'Why: '+(latest.why||'Not specified')+'\n'
    + 'Expected outcome: '+(latest.expected||'Not specified')+'\n\n'
    + 'RECENT PERFORMANCE (last 7 days):\n'+log+'\n\n'
    + 'PREVIOUS CHANGES:\n'+prevChanges+'\n\n'
    + 'Analyze this change and respond with:\n'
    + '1. VERDICT: Smart Move / Reasonable Risk / Caution / Red Flag\n'
    + '2. REASONING: 2-3 sentences on why, specific to KCH and where the campaign is right now\n'
    + '3. WATCH FOR: one specific thing to monitor in the next 7 days\n\n'
    + 'Be direct. No generic advice.'

  try {
    var resp = await fetch('https://kch-ai-proxy.charlie-2bb.workers.dev/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:600, messages:[{role:'user',content:prompt}]})
    });
    var data = await resp.json();
    var text = data.content && data.content[0] ? data.content[0].text : 'No response.';
    var formatted = text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');

    // Color-code the verdict
    var verdictColor = '#1c1c1c';
    if(text.includes('Smart Move'))    verdictColor = '#155e3e';
    if(text.includes('Reasonable Risk')) verdictColor = '#78350f';
    if(text.includes('Caution'))        verdictColor = '#92400e';
    if(text.includes('Red Flag'))       verdictColor = '#991b1b';

    var outDiv = document.createElement('div');
    outDiv.style.cssText = 'padding:16px;background:var(--surface);border-radius:8px;border:1px solid var(--border);';
    outDiv.innerHTML = formatted;

    var regenRow = document.createElement('div');
    regenRow.style.cssText = 'margin-top:10px;text-align:right;';
    var regenBtn = document.createElement('button');
    regenBtn.className = 'btn btn-ghost';
    regenBtn.style.fontSize = '11px';
    regenBtn.textContent = 'Re-analyze';
    regenBtn.addEventListener('click', function(){ btn.style.display='block'; output.style.display='none'; });
    regenRow.appendChild(regenBtn);

    output.innerHTML = '';
    output.appendChild(outDiv);
    output.appendChild(regenRow);
    output.style.display = 'block';
  } catch(e) {
    output.innerHTML = '<div style="padding:12px;background:var(--red-lt);border-radius:8px;border:1px solid var(--red-border);font-size:12px;color:var(--red);">Could not connect. Try again.</div>';
    output.style.display = 'block';
    btn.style.display = 'block';
  }
  loading.style.display = 'none';
}

function addChange(){
  var camp=getCamp(activeCampId);if(!camp)return;
  var what=document.getElementById('cl-what').value.trim();
  if(!what){alert('Please describe what changed.');return;}
  if(!camp.changes)camp.changes=[];
  camp.changes.unshift({id:Date.now(),date:document.getElementById('cl-date').value,cat:document.getElementById('cl-cat').value,what:what,why:document.getElementById('cl-why').value.trim(),expected:document.getElementById('cl-expected').value.trim(),outcome:''});
  save('campaigns',campaigns);
  ['cl-what','cl-why','cl-expected'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
  var m=document.getElementById('cl-saved');if(m){m.style.display='inline';setTimeout(function(){m.style.display='none';},2000);}
  renderCL(camp);
  wireCLButtons(camp);
}
function updateOutcome(id,val){
  var camp=getCamp(activeCampId);if(!camp)return;
  var ch=camp.changes.find(function(c){return c.id===id;});
  if(ch){ch.outcome=val;save('campaigns',campaigns);}
}
function removeChange(id){
  if(!confirm('Remove this entry?'))return;
  var camp=getCamp(activeCampId);if(!camp)return;
  camp.changes=camp.changes.filter(function(c){return c.id!==id;});
  save('campaigns',campaigns);renderCL(camp);
}
function renderCL(camp){
  var list=document.getElementById('cl-list');if(!list)return;
  if(!camp||!camp.changes||camp.changes.length===0){
    list.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;background:var(--white);border-radius:10px;border:1px solid var(--border);">No changes logged yet.</div>';return;
  }
  list.innerHTML=camp.changes.map(function(c){
    var cc=catColors[c.cat]||{bg:'#f5f3ef',color:'var(--muted)'};
    var ds=c.date?new Date(c.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
    return'<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px;flex-wrap:wrap;">'
      +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
      +'<span style="font-size:13px;font-weight:700;color:var(--stone);">'+ds+'</span>'
      +'<span style="font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;background:'+cc.bg+';color:'+cc.color+';">'+c.cat+'</span>'
      +'</div>'
      +'<button onclick="removeChange('+c.id+')" style="font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 4px;">Remove</button>'
      +'</div>'
      +'<div style="font-size:13px;font-weight:700;color:var(--stone);margin-bottom:6px;">'+c.what+'</div>'
      +(c.why?'<div style="font-size:12px;color:var(--muted);margin-bottom:4px;"><span style="font-weight:700;color:var(--stone);">Why:</span> '+c.why+'</div>':'')
      +(c.expected?'<div style="font-size:12px;color:var(--muted);margin-bottom:8px;"><span style="font-weight:700;color:var(--stone);">Expected:</span> '+c.expected+'</div>':'')
      +'<div><label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);display:block;margin-bottom:4px;">Actual Outcome (fill in later)</label>'
      +'<input type="text" value="'+(c.outcome||'').replace(/"/g,'&quot;')+'" placeholder="What actually happened after this change..." onchange="updateOutcome('+c.id+',this.value)" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;color:var(--stone);background:var(--surface);outline:none;"></div>'
      +'</div>';
  }).join('');
}

// ══════════════════════════════════════════
function addNeg(){
  var camp=getCamp(activeCampId);if(!camp)return;
  var val=document.getElementById('neg-input').value.trim().toLowerCase();
  if(!val)return;
  if(!camp.negatives)camp.negatives=[];
  if(camp.negatives.some(function(n){return n.text===val;})){alert('Already in your list.');return;}
  camp.negatives.unshift({text:val,added:false});
  save('campaigns',campaigns);
  document.getElementById('neg-input').value='';
  var m=document.getElementById('neg-saved');if(m){m.style.display='inline';setTimeout(function(){m.style.display='none';},2000);}
  renderNG(camp);
}
function toggleNeg(camp,idx){
  if(!camp||!camp.negatives)return;
  camp.negatives[idx].added=!camp.negatives[idx].added;
  save('campaigns',campaigns);renderNG(camp);
}
function removeNeg(idx){
  var camp=getCamp(activeCampId);if(!camp)return;
  camp.negatives.splice(idx,1);save('campaigns',campaigns);renderNG(camp);
}
function copyNegs(){
  var camp=getCamp(activeCampId);if(!camp||!camp.negatives)return;
  var text=camp.negatives.map(function(n){return n.text;}).join('\n');
  navigator.clipboard.writeText(text).then(function(){
    var btn=event.target;var orig=btn.textContent;btn.textContent='Copied!';
    setTimeout(function(){btn.textContent=orig;},2000);
  }).catch(function(){alert('Copy failed — try selecting the list manually.');});
}
function renderNG(camp){
  var list=document.getElementById('neg-list');if(!list)return;
  var nc=document.getElementById('neg-count');
  if(!camp||!camp.negatives){if(nc)nc.textContent='';list.innerHTML='';return;}
  var added=camp.negatives.filter(function(n){return n.added;}).length;
  if(nc)nc.textContent=added+' of '+camp.negatives.length+' added to Google Ads';
  if(camp.negatives.length===0){list.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;background:var(--white);border-radius:10px;border:1px solid var(--border);">No negative keywords yet.</div>';return;}
  var pending=camp.negatives.map(function(n,i){return{n:n,i:i};}).filter(function(x){return !x.n.added;});
  var done=camp.negatives.map(function(n,i){return{n:n,i:i};}).filter(function(x){return x.n.added;});
  function rowHTML(x){
    var n=x.n,i=x.i;
    var bg=n.added?'var(--green-lt)':'var(--white)';
    var cb=n.added?'var(--green)':'var(--border)';
    var cbg=n.added?'var(--green)':'var(--white)';
    var fw=n.added?'400':'600';
    var fc=n.added?'var(--muted)':'var(--stone)';
    var td=n.added?'line-through':'none';
    var sc=n.added?'var(--green)':'var(--muted)';
    var st=n.added?'Added in Ads':'Pending';
    var campRef="getCamp('"+activeCampId+"')";
    return'<div style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid #f5f3ef;background:'+bg+';cursor:pointer;" onclick="toggleNeg('+campRef+','+i+');">'
      +'<div style="width:20px;height:20px;min-width:20px;border-radius:4px;border:2px solid '+cb+';background:'+cbg+';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
      +(n.added?'<span style="color:#fff;font-size:11px;font-weight:800;">&#10003;</span>':'')+'</div>'
      +'<div style="flex:1;font-size:13px;font-weight:'+fw+';color:'+fc+';text-decoration:'+td+';">'+n.text+'</div>'
      +'<div style="font-size:10px;font-weight:700;color:'+sc+';">'+st+'</div>'
      +'<button onclick="event.stopPropagation();removeNeg('+i+');" style="font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 6px;flex-shrink:0;">&#10005;</button>'
      +'</div>';
  }
  var html='<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;">';
  if(pending.length){html+='<div style="padding:8px 16px;background:var(--surface);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);">Still to add in Google Ads — '+pending.length+' remaining</div>';pending.forEach(function(x){html+=rowHTML(x);});}
  if(done.length){html+='<div style="padding:8px 16px;background:var(--green-lt);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--green);border-top:1px solid var(--green-border);border-bottom:1px solid var(--green-border);">Added to Google Ads — '+done.length+' complete</div>';done.forEach(function(x){html+=rowHTML(x);});}
  html+='</div>';list.innerHTML=html;
}

// AI KEYWORD STRATEGY
// ══════════════════════════════════════════
async function getKWRec(){
  var camp = getCamp(activeCampId);
  var btn = document.getElementById('kw-ai-btn');
  var loading = document.getElementById('kw-ai-loading');
  var output = document.getElementById('kw-ai-output');
  btn.style.display='none'; loading.style.display='block'; output.style.display='none';

  var active = camp.keywords ? camp.keywords.filter(function(k){return k.status==='Active';}).map(function(k){return '"'+k.text+'" ('+k.match+' match)'+(k.notes?' — '+k.notes:'');}).join('\n') : 'None logged';
  var testing = camp.keywords ? camp.keywords.filter(function(k){return k.status==='Testing';}).map(function(k){return '"'+k.text+'" ('+k.match+' match)';}).join(', ') : 'None';
  var paused = camp.keywords ? camp.keywords.filter(function(k){return k.status==='Paused'||k.status==='Removed';}).map(function(k){return '"'+k.text+'" — '+k.notes;}).join('\n') : 'None';
  var negList = camp.negatives ? camp.negatives.map(function(n){return n.text+(n.added?' (added)':' (pending)');}).join(', ') : 'None';
