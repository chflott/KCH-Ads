<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCH — Google Ads Command Center</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --navy:#0d1f3c;
  --navy-lt:#1a3258;
  --stone:#0f172a;
  --stone-mid:#334155;
  --gold:#b07d2e;
  --gold-bright:#d4973a;
  --gold-lt:#fefce8;
  --gold-border:#f0d060;
  --green:#166534;
  --green-lt:#f0fdf4;
  --green-border:#86efac;
  --red:#b91c1c;
  --red-lt:#fef2f2;
  --red-border:#fca5a5;
  --amber:#92400e;
  --amber-lt:#fffbeb;
  --amber-border:#fcd34d;
  --blue:#1d4ed8;
  --blue-lt:#eff6ff;
  --blue-border:#93c5fd;
  --border:#e2e8f0;
  --border-lt:#f1f5f9;
  --muted:#64748b;
  --muted-lt:#94a3b8;
  --bg:#f8fafc;
  --surface:#f1f5f9;
  --white:#ffffff;
  --radius:10px;
  --shadow:0 1px 2px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 10px 30px rgba(0,0,0,.1),0 4px 10px rgba(0,0,0,.05);
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--stone);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;}

/* ── HEADER ── */
.hdr{
  background:var(--navy);
  padding:0 28px;
  border-bottom:1px solid rgba(255,255,255,.07);
  position:sticky;top:0;z-index:50;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px;}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.hdr-logo{
  width:40px;height:40px;
  border-radius:50%;
  flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
  object-fit:cover;
}
.hdr-title{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.2px;}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px;letter-spacing:.6px;text-transform:uppercase;font-weight:500;}
.hdr-back{
  display:none;align-items:center;gap:6px;
  color:rgba(255,255,255,.45);font-size:12px;font-weight:500;
  cursor:pointer;padding:6px 14px;border-radius:6px;
  border:1px solid rgba(255,255,255,.1);transition:all .18s;background:none;
}
.hdr-back:hover{background:rgba(255,255,255,.08);color:#fff;}
.hdr-campaign-name{font-size:11px;font-weight:500;color:rgba(196,154,42,.8);display:none;padding-bottom:8px;letter-spacing:.3px;}

/* ── DASHBOARD ── */
#page-home{min-height:100vh;}
.dash-wrap{padding:32px 28px;max-width:1100px;margin:0 auto;}
.dash-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.dash-header h2{font-size:22px;font-weight:700;color:var(--stone);letter-spacing:-.4px;}
.dash-header p{font-size:12px;color:var(--muted);margin-top:4px;}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:7px;
  font-size:12px;font-weight:600;border:none;cursor:pointer;
  transition:all .15s;letter-spacing:.1px;font-family:inherit;
  white-space:nowrap;
}
.btn-gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#fff;box-shadow:0 1px 4px rgba(176,125,46,.3);}
.btn-gold:hover{filter:brightness(1.08);box-shadow:0 2px 8px rgba(176,125,46,.4);}
.btn-ghost{background:var(--white);color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--surface);color:var(--stone);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy-lt);}
.btn-sm{padding:6px 12px;font-size:11px;}

.del-btn:hover { color: #ef4444 !important; }

/* ── CAMPAIGN CARDS ── */
.campaign-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;margin-bottom:28px;}
.camp-card{
  background:var(--white);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;cursor:pointer;transition:all .2s;
  box-shadow:var(--shadow);
}
.camp-card:hover{
  border-color:rgba(176,125,46,.4);
  box-shadow:0 8px 28px rgba(176,125,46,.12),0 2px 6px rgba(0,0,0,.04);
  transform:translateY(-2px);
}
.camp-card-top{padding:20px 20px 16px;}
.camp-card-type{
  display:inline-flex;align-items:center;
  font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;
  margin-bottom:10px;color:var(--muted);
  background:var(--surface);padding:3px 9px;border-radius:99px;
}
.camp-card-name{font-size:16px;font-weight:700;color:var(--stone);margin-bottom:4px;letter-spacing:-.3px;}
.camp-card-meta{font-size:11px;color:var(--muted-lt);}
.camp-card-stats{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border-lt);}
.camp-stat{padding:14px 12px;text-align:center;border-right:1px solid var(--border-lt);}
.camp-stat:last-child{border-right:none;}
.camp-stat-val{font-size:16px;font-weight:700;color:var(--stone);font-family:monospace;letter-spacing:-.5px;}
.camp-stat-lbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted-lt);margin-top:4px;}
.camp-card-foot{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-top:1px solid var(--border-lt);}
.camp-status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0;}
.camp-status-text{font-size:11px;font-weight:600;}
.camp-open-btn{font-size:11px;font-weight:600;color:var(--gold);background:none;border:none;cursor:pointer;opacity:.8;}
.camp-open-btn:hover{opacity:1;}

/* Status */
.status-learning{background:#f59e0b;}.status-learning-text{color:#78350f;}
.status-active{background:#22c55e;}.status-active-text{color:#14532d;}
.status-paused{background:#94a3b8;}.status-paused-text{color:#475569;}
.status-issue{background:#f87171;}.status-issue-text{color:#7f1d1d;}

/* ── ADD CARD ── */
.add-camp-card{
  background:var(--white);border:2px dashed var(--border);border-radius:14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;cursor:pointer;transition:all .2s;min-height:160px;
}
.add-camp-card:hover{border-color:var(--gold);background:var(--gold-lt);}
.add-camp-card div:first-child{font-size:22px;margin-bottom:8px;opacity:.35;}
.add-camp-card div:last-child{font-size:12px;font-weight:600;color:var(--muted);}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border-radius:16px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal h3{font-size:18px;font-weight:700;margin:0 0 6px;letter-spacing:-.3px;}
.modal p{font-size:12px;color:var(--muted);margin:0 0 22px;line-height:1.6;}
.mf{margin-bottom:14px;}
.mf label{display:block;font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.mf input,.mf select,.mf textarea{
  width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;color:var(--stone);background:var(--white);
  outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit;
}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(176,125,46,.1);}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;}
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px;}
.type-opt{border:2px solid var(--border);border-radius:10px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.type-opt:hover{border-color:var(--gold-bright);}
.type-opt.selected{border-color:var(--navy);background:var(--blue-lt);}
.type-opt-icon{font-size:22px;margin-bottom:6px;}
.type-opt-label{font-size:10px;font-weight:700;color:var(--stone);}
.type-opt-sub{font-size:9px;color:var(--muted);margin-top:2px;}

/* ── WORKSPACE ── */
.camp-wrap{display:flex;flex-direction:column;min-height:calc(100vh - 56px);}

/* Tab bar */
.tabs{
  display:flex;
  background:var(--white);
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding:0 16px;
  gap:2px;
  position:sticky;top:56px;z-index:40;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex-shrink:0;
  padding:0 14px;
  height:44px;
  display:flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;
  color:var(--muted);background:none;border:none;
  border-bottom:2px solid transparent;
  margin-bottom:-1px;
  cursor:pointer;transition:color .15s,border-color .15s;
  white-space:nowrap;
}
.tab.active{color:var(--stone);border-bottom-color:var(--gold-bright);}
.tab:hover:not(.active){color:var(--stone-mid);}
.tab-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ef4444;flex-shrink:0;}

/* Content area */
.wrap{padding:24px 28px 80px;max-width:900px;margin:0 auto;}
.screen{display:none;}
.screen.active{display:block;}

/* ── SECTION LABEL ── */
.slbl{
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted-lt);margin:28px 0 10px;
}

/* ── CARDS ── */
.card{
  background:var(--white);border-radius:var(--radius);
  border:1px solid var(--border);margin-bottom:14px;
  overflow:hidden;box-shadow:var(--shadow);
}
.card-head{padding:16px 20px 13px;border-bottom:1px solid var(--border-lt);}
.card-head h3{font-size:14px;font-weight:600;margin:0 0 2px;color:var(--stone);letter-spacing:-.15px;}
.card-head p{font-size:11px;color:var(--muted);margin:0;line-height:1.5;}
.card-body{padding:16px 20px;}

/* ── ALERTS ── */
.alert{border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.7;margin-bottom:14px;border:1px solid;}
.alert-gold{background:#fefce8;border-color:#fde047;color:#713f12;}
.alert-red{background:var(--red-lt);border-color:var(--red-border);color:#7f1d1d;}
.alert-blue{background:var(--blue-lt);border-color:var(--blue-border);color:#1e3a8a;}
.alert-neutral{background:var(--surface);border-color:var(--border);color:var(--stone);}
.alert strong{font-weight:700;display:block;margin-bottom:2px;font-size:12px;}

/* ── FORM INPUTS ── */
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sym{position:relative;}
.sym::before{content:attr(data-s);position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);font-family:monospace;pointer-events:none;}
.sym input{padding-left:26px;}

/* ── STAT TILES ── */
.tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
@media(min-width:580px){.tile-grid{grid-template-columns:repeat(4,1fr);}}
.tile{border-radius:10px;padding:16px 18px;border:1px solid var(--border);background:var(--white);box-shadow:var(--shadow);transition:box-shadow .15s;}
.tile:hover{box-shadow:var(--shadow-md);}
.tile-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:8px;}
.tile-val{font-size:26px;font-weight:700;line-height:1;color:var(--stone);font-family:monospace;letter-spacing:-1.5px;}
.tile-sub{font-size:10px;font-weight:500;margin-top:6px;color:var(--muted);}
.tile.good{background:var(--green-lt);border-color:var(--green-border);}
.tile.good .tile-val,.tile.good .tile-lbl{color:var(--green);}
.tile.warn{background:var(--amber-lt);border-color:var(--amber-border);}
.tile.warn .tile-val{color:var(--amber);}
.tile.bad{background:var(--red-lt);border-color:var(--red-border);}
.tile.bad .tile-val{color:var(--red);}
.tile.neu{}

/* ── RECOVERY ── */
.rstep{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border-lt);cursor:pointer;transition:background .12s;}
.rstep:last-child{border-bottom:none;}
.rstep:hover{background:var(--bg);}
.rstep.done{background:var(--green-lt);}
.rnum{width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;margin-top:2px;transition:all .2s;}
.rstep.done .rnum{background:var(--green);border-color:var(--green);color:#fff;}
.rstep.done .rnum::after{content:'✓';}
.rstep.done .rnum span{display:none;}
.ri{flex:1;}
.rt{font-size:13px;font-weight:600;line-height:1.4;color:var(--stone);}
.rstep.done .rt{text-decoration:line-through;color:var(--muted);font-weight:400;}
.rd{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.65;}
.rnote{font-size:11px;color:var(--amber);background:var(--amber-lt);border-left:3px solid #f59e0b;padding:8px 12px;border-radius:0 6px 6px 0;margin-top:9px;line-height:1.6;}
.dont-row{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border-lt);}
.dont-row:last-child{border-bottom:none;}
.dont-icon{font-size:11px;font-weight:800;color:var(--red);min-width:16px;margin-top:3px;flex-shrink:0;}
.dont-text strong{font-size:13px;font-weight:600;display:block;margin-bottom:3px;}
.dont-text p{font-size:12px;color:var(--muted);line-height:1.6;margin:0;}

/* ── CHECKLIST ── */
.cl{list-style:none;margin:0;padding:0;}
.cl li{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border-lt);cursor:pointer;transition:background .12s;}
.cl li:last-child{border-bottom:none;}
.cl li:hover{background:var(--bg);}
.cl li.done{background:var(--green-lt);}
.chk{width:20px;height:20px;min-width:20px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;margin-top:2px;transition:all .2s;flex-shrink:0;}
.cl li.done .chk{background:var(--green);border-color:var(--green);}
.cl li.done .chk::after{content:'✓';}
.ci{flex:1;min-width:0;}
.ct{font-size:13px;font-weight:600;line-height:1.35;}
.cl li.done .ct{text-decoration:line-through;color:var(--muted);font-weight:400;}
.cd{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.65;}
.cnote{font-size:11px;color:var(--amber);background:var(--amber-lt);border-left:3px solid #f59e0b;padding:7px 11px;border-radius:0 6px 6px 0;margin-top:8px;line-height:1.6;}
.ctag{font-size:10px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0;margin-top:3px;}
.tag-priority{background:#fee2e2;color:#991b1b;}
.tag-strategic{background:var(--blue-lt);color:var(--blue);}
.tag-growth{background:var(--green-lt);color:var(--green);}

/* ── PROGRESS BAR ── */
.prog-wrap{padding:16px 20px 14px;}
.prog-row{display:flex;justify-content:space-between;margin-bottom:8px;}
.prog-lbl{font-size:12px;font-weight:600;}
.prog-num{font-size:12px;color:var(--muted);font-family:monospace;}
.prog-bg{background:var(--surface);border-radius:99px;height:5px;overflow:hidden;}
.prog-fill{height:5px;border-radius:99px;background:linear-gradient(90deg,var(--gold),#22c55e);transition:width .4s ease;}
.done-banner{display:none;background:var(--green);color:#fff;border-radius:8px;padding:14px 18px;margin-bottom:14px;text-align:center;}
.done-banner.show{display:block;}
.done-banner strong{display:block;font-size:14px;margin-bottom:3px;}
.done-banner p{font-size:12px;opacity:.8;margin:0;}

/* ── JOB CALC ── */
.jcalc{background:var(--stone);border-radius:10px;padding:18px 20px;margin-bottom:14px;}
.jcalc h3{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold-bright);margin:0 0 14px;}
.jrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.jrow:last-child{border-bottom:none;padding-top:12px;margin-top:4px;}
.jlbl{font-size:12px;color:rgba(255,255,255,.45);}
.jval{font-size:14px;font-weight:600;color:#fff;font-family:monospace;}
.jval.gold{color:var(--gold-bright);}
.jval.green{color:#4ade80;}

/* ── VERDICT ── */
.verdict{display:none;border-radius:10px;padding:18px;border:1px solid;margin-top:0;}
.verdict.show{display:block;}
.v-bad{background:var(--red-lt);border-color:var(--red-border);}
.v-warn{background:var(--amber-lt);border-color:var(--amber-border);}
.v-good{background:var(--green-lt);border-color:var(--green-border);}
.v-great{background:#f0fdf4;border-color:#86efac;}
.verdict h4{font-size:15px;font-weight:700;margin:0 0 8px;letter-spacing:-.2px;}
.verdict .vbody{font-size:12px;line-height:1.8;}
.vaction{margin-top:12px;padding:12px 14px;background:rgba(0,0,0,.04);border-radius:7px;}
.vaction-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
.vaction p{font-size:12px;line-height:1.65;margin:0;}

/* ── BENCHMARKS ── */
.bm{width:100%;border-collapse:collapse;}
.bm th{text-align:left;padding:10px 14px;background:var(--bg);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:2px solid var(--border);}
.bm th:not(:first-child){text-align:center;}
.bm td{padding:12px 14px;border-bottom:1px solid var(--border-lt);font-size:12px;vertical-align:top;}
.bm tr:last-child td{border-bottom:none;}
.bm td:not(:first-child){text-align:center;font-weight:700;}
.c-bad{color:#dc2626;}.c-warn{color:#d97706;}.c-good{color:#16a34a;}
.bm-sub{font-size:10px;color:var(--muted);font-weight:400;margin-top:2px;}
.bt{width:100%;border-collapse:collapse;}
.bt th{text-align:left;padding:10px 14px;background:var(--bg);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:2px solid var(--border);}
.bt td{padding:12px 14px;border-bottom:1px solid var(--border-lt);font-size:12px;vertical-align:top;}
.bt tr:last-child td{border-bottom:none;}
.bt-metric{font-size:16px;font-weight:700;font-family:monospace;letter-spacing:-1px;}
.bt-note{font-size:11px;color:var(--muted);line-height:1.6;margin-top:2px;}

/* ── NOTES ── */
.notes-area{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--stone);background:var(--white);resize:vertical;min-height:90px;outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit;line-height:1.65;}
.notes-area:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(176,125,46,.1);}
.btn-row{display:flex;align-items:center;margin-top:12px;gap:10px;}
.saved{font-size:11px;color:var(--green);display:none;font-weight:600;}

/* ── PIPELINE ── */
.pstep{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;z-index:1;}
.pdot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);transition:all .3s;cursor:default;}
.pdot.done{background:var(--green);border-color:var(--green);color:#fff;}
.pdot.active{background:var(--gold);border-color:var(--gold);color:#fff;}
.plbl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:center;line-height:1.3;}
.plbl.active{color:var(--stone);}

/* ── SIGNALS ── */
.signal-row{display:flex;align-items:flex-start;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border-lt);}
.signal-row:last-child{border-bottom:none;}
.sdot{width:8px;height:8px;min-width:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.dot-r{background:#ef4444;}.dot-a{background:#f59e0b;}.dot-g{background:#22c55e;}
.signal-row strong{font-size:13px;font-weight:600;display:block;margin-bottom:3px;}
.signal-row p{font-size:12px;color:var(--muted);line-height:1.65;margin:0;}

/* ── SEASONALITY ── */
.season-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.mo{border-radius:8px;padding:10px 6px;text-align:center;}
.mo-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.mo-bar{height:3px;border-radius:99px;margin:5px auto;}
.mo-status{font-size:8px;font-weight:700;line-height:1.3;}
.mo-hot{background:#fef3c7;color:#92400e;}
.mo-warm{background:var(--green-lt);color:#166534;}
.mo-cold{background:var(--surface);color:#94a3b8;}

/* ── KEYWORDS ── */


/* ── WARN BADGE ── */
.warn-badge,.tab-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ef4444;margin-left:5px;vertical-align:middle;flex-shrink:0;}

/* ── SECTION DIVIDER ── */
.section-divider{height:1px;background:var(--border-lt);margin:20px 0;}

<!-- ADD CAMPAIGN MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Add Campaign</h3>
    <p>Create a new campaign workspace.</p>
    <div class="mf">
      <label>Campaign Name</label>
      <input type="text" id="new-camp-name" placeholder="e.g. KCH — Retargeting Spring 2026">
    </div>
    <div class="mf">
      <label>Campaign Type</label>
      <div class="type-grid">
        <div class="type-opt selected" id="type-search">
          <div class="type-opt-icon">&#128269;</div>
          <div class="type-opt-label">Search</div>
          <div class="type-opt-sub">Keyword-based</div>
        </div>
        <div class="type-opt" id="type-pmax">
          <div class="type-opt-icon">&#9889;</div>
          <div class="type-opt-label">Perf. Max</div>
          <div class="type-opt-sub">AI-driven</div>
        </div>
        <div class="type-opt" id="type-display">
          <div class="type-opt-icon">&#128444;</div>
          <div class="type-opt-label">Display</div>
          <div class="type-opt-sub">Retargeting</div>
        </div>
      </div>
    </div>
    <div class="input-grid">
      <div class="mf">
        <label>Daily Budget</label>
        <div class="sym" data-s="$"><input type="number" id="new-camp-budget" placeholder="50"></div>
      </div>
      <div class="mf">
        <label>Status</label>
        <select id="new-camp-status">
          <option value="active">Active</option>
          <option value="learning">Learning Phase</option>
          <option value="paused">Paused</option>
        </select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-gold" id="modal-create">Create Campaign</button>

async function callAI(prompt, maxTokens){
  maxTokens = maxTokens || 1000;
  var resp = await fetch('https://kch-ai-proxy.charlie-2bb.workers.dev/', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      messages: [{role:'user', content: prompt}]
    })
  });
  var data = await resp.json();
  console.log('AI response:', JSON.stringify(data).slice(0, 300));
  if(!resp.ok) throw new Error('Worker ' + resp.status + ': ' + JSON.stringify(data));
  if(data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data.content && data.content[0] ? data.content[0].text : '';
}

var SB_URL = 'https://vxmuzvanuitevyciuxur.supabase.co';
var SB_KEY = 'sb_publishable_3E5Sbhkpl5uUXg7HFEAvuw_eqPyGswx';

async function sbGet(table, eq){
  var url = SB_URL + '/rest/v1/' + table + '?select=*';
  if(eq) url += '&' + eq.col + '=eq.' + encodeURIComponent(eq.val);
  var r = await fetch(url, {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  return r.ok ? r.json() : [];
}
async function sbUpsert(table, row){
  var r = await fetch(SB_URL+'/rest/v1/'+table, {
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
    body: JSON.stringify(row)
  });
  return r.ok;
}
async function sbDelete(table, eq){
  var url = SB_URL+'/rest/v1/'+table+'?'+eq.col+'=eq.'+encodeURIComponent(eq.val);
  var r = await fetch(url, {method:'DELETE', headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});

}

// ── LOCAL STORAGE (fallback + AI memory) ─
function save(key, val) {
  try { localStorage.setItem('kch_' + key, JSON.stringify(val)); } catch(e) {}
  // Also sync to Supabase async
  if(key === 'campaigns') syncCampaignsToSB(val);
}
function load(key, def) {
  try {
    var v = localStorage.getItem('kch_' + key);
    return (v !== null) ? JSON.parse(v) : def;
  } catch(e) { return def; }
}

// ── SUPABASE SYNC ─────────────────────────
async function syncCampaignsToSB(camps){
  try {
    for(var i=0; i<camps.length; i++){
      var c = camps[i];
      await sbUpsert('campaigns', {
        id: c.id,
        name: c.name,
        type: c.type,
        budget: c.budget,
        status: c.status,
        reset_date: c.resetDate,
        data: JSON.stringify(c)
      });
    }
  } catch(e){ console.warn('Supabase sync failed:', e); }
}

async function loadFromSB(){
  try {
    var rows = await sbGet('campaigns');
    if(!rows || rows.length === 0) return null;
    return rows.map(function(r){ return JSON.parse(r.data); });
  } catch(e){ return null; }
}

async function initFromSB(){
  // Always load from localStorage first so page renders immediately
  var local = load('campaigns', null);
  if(local && local.length > 0){
    campaigns = local;
    var hasKCH = campaigns.some(function(c){ return c.id === 'kch-search-001'; });
    if(!hasKCH) campaigns.unshift(DEFAULT_CAMPAIGN);

  // Render immediately with local data
  renderHome();
  // Then try Supabase in background and refresh if we get data
  try {
    var sbCamps = await loadFromSB();
    if(sbCamps && sbCamps.length > 0){
      campaigns = sbCamps;
      var hasKCH2 = campaigns.some(function(c){ return c.id === 'kch-search-001'; });
      if(!hasKCH2) campaigns.unshift(DEFAULT_CAMPAIGN);
      localStorage.setItem('kch_campaigns', JSON.stringify(campaigns));
      renderHome(); // refresh with cloud data
    } else if(campaigns.length > 0){
      syncCampaignsToSB(campaigns); // push local up to Supabase
    }
  } catch(e){
    // Supabase unavailable — already rendered with local data, nothing to do
    console.warn('Supabase sync failed:', e);
  }
}

function typeColor(t) {
  return t === 'search' ? {bg:'#eff4ff',color:'#1e3a8a'}
       : t === 'pmax'   ? {bg:'#fce7f3',color:'#9d174d'}
                        : {bg:'#f0faf5',color:'#155e3e'};
}
function statusLabel(s) {
  return s === 'learning' ? 'Learning Phase'
       : s === 'active'   ? 'Active'
       : s === 'paused'   ? 'Paused' : 'Unknown';
}
function getDaysFor(resetDate) {
  if (!resetDate) return 1;
  // Use Chicago midnight as the day boundary
  var now = new Date();
  var chicagoNow = new Date(now.toLocaleString('en-US', {timeZone: 'America/Chicago'}));
  var reset = new Date(resetDate + 'T00:00:00');
  var chicagoReset = new Date(reset.toLocaleString('en-US', {timeZone: 'America/Chicago'}));
  // Zero out time on both to compare calendar days
  chicagoNow.setHours(0,0,0,0);
  chicagoReset.setHours(0,0,0,0);
  var diff = Math.floor((chicagoNow - chicagoReset) / 86400000) + 1;
  return diff > 0 ? diff : 1;
}

function getMonthsFromLog(perfLog){
  var seen = {};
  (perfLog||[]).forEach(function(e){
    var m = e.date.slice(0,7); // "YYYY-MM"
    seen[m] = true;
  });
  return Object.keys(seen).sort().reverse(); // newest first
}
function monthLabel(ym){ // "2026-03" → "Mar 2026"
  var d = new Date(ym+'-15T12:00:00');

}

// ── DAILY SCORE CALCULATOR ───────────────
function calcDayScore(e, dayNum){
  // Weights: impression share, CTR, CPL, QS, spend efficiency, lead presence
  // All adjusted for recovery phase — early days scored more leniently
  var score = 0;
  var budget = 145; // fallback
  var camp = getCamp(activeCampId);
  if(camp && camp.budget) budget = parseFloat(camp.budget) || 145;

  // Recovery leniency factor: full leniency day 1, none by day 14+
  var leniency = Math.max(0, 1 - (dayNum - 1) / 13);

  // 1. IMPRESSION SHARE (25pts) — are we showing up?
  if(e.is != null){
    var isTarget = 40 + (1 - leniency) * 20; // target rises from 40% to 60% as recovery progresses
    var isPts = Math.min(25, (e.is / isTarget) * 25);
    score += isPts;
  } else {
    // Estimate from impressions — if we have any impressions at all, partial credit
    score += e.impr > 0 ? Math.min(15, (e.impr / 30) * 15) : 0;
  }

  // 2. CTR (20pts) — are clicks meaningful relative to impressions?
  if(e.impr > 0){
    var ctr = e.clicks / e.impr * 100;
    var ctrPts = ctr >= 5 ? 20 : ctr >= 2 ? 10 + (ctr - 2) / 3 * 10 : (ctr / 2) * 10;
    score += Math.min(20, ctrPts);
  }

  // 3. SPEND EFFICIENCY (20pts) — spending meaningfully without blowing budget
  var spendRatio = e.spend / budget;
  if(spendRatio >= 0.7 && spendRatio <= 1.05) score += 20;       // hitting budget well
  else if(spendRatio >= 0.5) score += 14;
  else if(spendRatio >= 0.3) score += 8;
  else if(spendRatio > 0)    score += 4;
  // Overspend is neutral not penalized — Google handles caps

  // 4. QUALITY SCORE (15pts)
  if(e.qs != null){
    score += e.qs >= 7 ? 15 : e.qs >= 5 ? 8 + (e.qs - 5) * 3.5 : (e.qs / 5) * 8;
  } else {
    score += 7; // neutral if not logged
  }

  // 5. LEAD / CPL (20pts) — bonus for leads, penalty for no leads late in recovery
  if(e.leads > 0){
    var cpl = e.spend / e.leads;
    score += cpl < 150 ? 20 : cpl < 500 ? 14 : cpl < 1500 ? 8 : 4;
  } else {
    // No leads is expected early, penalized later
    var noLeadPenalty = leniency > 0.5 ? 10 : leniency > 0.2 ? 5 : 0;
    score += noLeadPenalty;
  }

  return Math.round(Math.min(100, Math.max(0, score)));
}

function renderScoreChart(camp, range){
  var el = document.getElementById('perf-score-chart');
  if(!el) return;
  el.innerHTML = '';

  range = range || '30';
  var hasData = camp.perfLog && camp.perfLog.length > 0;

  // Always render the card shell
  var card = document.createElement('div');
  card.className = 'card';
  card.style.cssText = 'margin-bottom:16px;overflow:hidden;';

  // Header row
  var headRow = document.createElement('div');
  headRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:16px 20px 0;flex-wrap:wrap;gap:10px;';

  var headLeft = document.createElement('div');
  headLeft.innerHTML = '<div style="font-size:14px;font-weight:700;color:var(--stone);letter-spacing:-.1px;">Daily Campaign Score</div>'
    + '<div style="font-size:11px;color:var(--muted);margin-top:2px;">0–100 per day, calibrated to recovery stage</div>';

  // Range pills
  var pills = document.createElement('div');
  pills.style.cssText = 'display:flex;gap:4px;';
  ['7','30','90'].forEach(function(r){
    var pill = document.createElement('button');
    pill.textContent = r==='7'?'7D':r==='30'?'30D':'90D';
    var isActive = r === range;
    pill.style.cssText = 'font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;border:1px solid '+(isActive?'var(--stone)':'var(--border)')+';cursor:pointer;background:'+(isActive?'var(--stone)':'transparent')+';color:'+(isActive?'#fff':'var(--muted)')+';transition:all .15s;font-family:inherit;';
    pill.addEventListener('click', function(){ renderScoreChart(camp, r); });
    pills.appendChild(pill);
  });

  headRow.appendChild(headLeft);
  headRow.appendChild(pills);
  card.appendChild(headRow);

  if(!hasData){
    var empty = document.createElement('div');
    empty.style.cssText = 'padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;';
    empty.innerHTML = '<div style="font-size:28px;margin-bottom:8px;opacity:.3;">📊</div>Log daily entries to see your score chart';
    card.appendChild(empty);
    el.appendChild(card);
    return;
  }

  // Filter by range
  var now = new Date();
  var cutoff = new Date(now);
  if(range==='7') cutoff.setDate(now.getDate()-7);
  else if(range==='30') cutoff.setDate(now.getDate()-30);
  else cutoff.setDate(now.getDate()-90);
  var cutoffStr = cutoff.toISOString().split('T')[0];
  var filteredLog = camp.perfLog.filter(function(e){ return e.date >= cutoffStr; });

  if(filteredLog.length === 0){
    var empty2 = document.createElement('div');
    empty2.style.cssText = 'padding:30px 20px;text-align:center;color:var(--muted);font-size:13px;';
    empty2.textContent = 'No entries in this range.';
    card.appendChild(empty2);
    el.appendChild(card);
    return;
  }

  var resetDate = camp.resetDate || '2026-03-02';
  var scored = filteredLog.map(function(e){
    var d0 = new Date(resetDate+'T12:00:00');
    var d1 = new Date(e.date+'T12:00:00');
    var dayNum = Math.max(1, Math.round((d1-d0)/86400000)+1);
    return { date:e.date, dayNum:dayNum, score:calcDayScore(e,dayNum), entry:e };
  });

  // ── SVG CHART
  var W=600, H=200, PAD={top:24,right:20,bottom:36,left:36};
  var chartW = W-PAD.left-PAD.right;
  var chartH = H-PAD.top-PAD.bottom;
  var n = scored.length;

  var svgWrap = document.createElement('div');
  svgWrap.style.cssText = 'padding:16px 16px 0;';

  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.style.cssText = 'width:100%;height:auto;display:block;';

  // Grid lines
  [0,25,50,75,100].forEach(function(v){
    var y = PAD.top + chartH - (v/100)*chartH;
    var line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',PAD.left); line.setAttribute('x2',PAD.left+chartW);
    line.setAttribute('y1',y); line.setAttribute('y2',y);
    line.setAttribute('stroke', v===0?'#cbd5e1':'#f1f5f9');
    line.setAttribute('stroke-width','1');
    svg.appendChild(line);
    if(v>0){
      var txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',PAD.left-6); txt.setAttribute('y',y+3.5);
      txt.setAttribute('text-anchor','end');
      txt.setAttribute('font-size','8'); txt.setAttribute('fill','#94a3b8');
      txt.textContent = v;
      svg.appendChild(txt);
    }
  });

  var barW = Math.min(32, Math.max(8, (chartW/n)*0.55));
  var step = n===1 ? 0 : chartW/(n-1);

  // Gradient defs
  var defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  ['green','amber','red'].forEach(function(name){
    var grad = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
    grad.setAttribute('id','grad-'+name); grad.setAttribute('x1','0'); grad.setAttribute('y1','0'); grad.setAttribute('x2','0'); grad.setAttribute('y2','1');
    var s1 = document.createElementNS('http://www.w3.org/2000/svg','stop');
    var s2 = document.createElementNS('http://www.w3.org/2000/svg','stop');
    s1.setAttribute('offset','0%');
    s2.setAttribute('offset','100%');
    if(name==='green'){ s1.setAttribute('stop-color','#22c55e'); s2.setAttribute('stop-color','#16a34a'); }
    else if(name==='amber'){ s1.setAttribute('stop-color','#fbbf24'); s2.setAttribute('stop-color','#d97706'); }
    else { s1.setAttribute('stop-color','#f87171'); s2.setAttribute('stop-color','#dc2626'); }
    grad.appendChild(s1); grad.appendChild(s2);
    defs.appendChild(grad);
  });
  svg.appendChild(defs);

  function gradFor(s){ return s>=75?'url(#grad-green)':s>=50?'url(#grad-amber)':'url(#grad-red)'; }

  // Area fill under trend line
  if(n>=2){
    var areaPoints = scored.map(function(d,i){
      var x = PAD.left+(n===1?chartW/2:i*step);
      var y = PAD.top+chartH-(d.score/100)*chartH;
      return x+','+y;
    });
    var firstX = PAD.left;
    var lastX  = PAD.left+(n-1)*step;
    var areaPath = 'M'+firstX+','+(PAD.top+chartH)+' L'+areaPoints.join(' L')+' L'+lastX+','+(PAD.top+chartH)+' Z';
    var areaEl = document.createElementNS('http://www.w3.org/2000/svg','path');
    areaEl.setAttribute('d', areaPath);
    areaEl.setAttribute('fill','url(#grad-green)');
    areaEl.setAttribute('opacity','0.06');
    svg.appendChild(areaEl);
  }

  // Bars
  scored.forEach(function(d,i){
    var x = PAD.left+(n===1?chartW/2:i*step);
    var barH = Math.max(2,(d.score/100)*chartH);
    var y = PAD.top+chartH-barH;
    var rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x',x-barW/2); rect.setAttribute('y',y);
    rect.setAttribute('width',barW); rect.setAttribute('height',barH);
    rect.setAttribute('rx','4');
    rect.setAttribute('fill',gradFor(d.score));
    rect.setAttribute('opacity','0.85');
    svg.appendChild(rect);

    // Score label
    if(barW > 14){
      var lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
      lbl.setAttribute('x',x); lbl.setAttribute('y',y-5);
      lbl.setAttribute('text-anchor','middle');
      lbl.setAttribute('font-size','9'); lbl.setAttribute('font-weight','700');
      lbl.setAttribute('fill',scoreColor(d.score));
      lbl.textContent = d.score;
      svg.appendChild(lbl);
    }

    // X label
    var ds = new Date(d.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    var xlbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    xlbl.setAttribute('x',x); xlbl.setAttribute('y',PAD.top+chartH+14);
    xlbl.setAttribute('text-anchor','middle');
    xlbl.setAttribute('font-size','8'); xlbl.setAttribute('fill','#94a3b8');
    // Only show every Nth label if crowded
    if(n<=10 || i%Math.ceil(n/10)===0) xlbl.textContent = ds;
    svg.appendChild(xlbl);
  });

  // Trend line
  if(n>=2){
    var pts = scored.map(function(d,i){
      var x = PAD.left+(n===1?chartW/2:i*step);
      var y = PAD.top+chartH-(d.score/100)*chartH;
      return x+','+y;
    }).join(' ');
    var poly = document.createElementNS('http://www.w3.org/2000/svg','polyline');
    poly.setAttribute('points',pts);
    poly.setAttribute('fill','none');
    poly.setAttribute('stroke','#334155');
    poly.setAttribute('stroke-width','1.5');
    poly.setAttribute('stroke-linecap','round');
    poly.setAttribute('stroke-linejoin','round');
    poly.setAttribute('opacity','0.5');
    svg.appendChild(poly);

    scored.forEach(function(d,i){
      var x = PAD.left+(n===1?chartW/2:i*step);
      var y = PAD.top+chartH-(d.score/100)*chartH;
      var dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',x); dot.setAttribute('cy',y);
      dot.setAttribute('r','3');
      dot.setAttribute('fill','#fff');
      dot.setAttribute('stroke','#334155');
      dot.setAttribute('stroke-width','1.5');
      svg.appendChild(dot);
    });
  }

  svgWrap.appendChild(svg);
  card.appendChild(svgWrap);

  // Legend + avg score footer
  var avg = Math.round(scored.reduce(function(s,d){return s+d.score;},0)/scored.length);
  var footer = document.createElement('div');
  footer.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-top:1px solid var(--border-lt);margin-top:12px;flex-wrap:wrap;gap:8px;';
  footer.innerHTML = '<div style="display:flex;gap:14px;font-size:10px;color:var(--muted);">'
    + '<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#22c55e;margin-right:4px;vertical-align:middle;"></span>75+ Strong</span>'
    + '<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#fbbf24;margin-right:4px;vertical-align:middle;"></span>50–74 Okay</span>'
    + '<span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#f87171;margin-right:4px;vertical-align:middle;"></span>&lt;50 Needs work</span>'
    + '</div>'
    + '<div style="font-size:11px;font-weight:700;color:var(--stone);">Avg score: <span style="color:'+scoreColor(avg)+';">'+avg+'</span></div>';
  card.appendChild(footer);
  el.appendChild(card);
}

// ── TREND CHART ──────────────────────────
function renderTrendChart(camp){
  var el = document.getElementById('perf-trend-chart');
  if(!el) return;

  var log = (camp.perfLog || []).slice().sort(function(a,b){ return a.date.localeCompare(b.date); });

  if(log.length < 2){
    el.innerHTML = '<div class="card" style="margin-bottom:14px;"><div class="card-body" style="padding:32px 20px;text-align:center;color:var(--muted);font-size:13px;">Log at least 2 days to see trend charts.</div></div>';
    return;
  }

  var W = 700, H = 280, PAD = {t:28, r:32, b:52, l:58};
  var CW = W - PAD.l - PAD.r;
  var CH = H - PAD.t - PAD.b;
  var N  = log.length;

  function sx(i){ return PAD.l + (i / Math.max(N-1,1)) * CW; }
  function sy(v, mx){ return PAD.t + CH - (v / Math.max(mx,1)) * CH; }
  function nice(arr){ return arr.filter(function(v){ return v != null && !isNaN(v) && v > 0; }); }

  var imprs  = log.map(function(e){ return e.impr  || 0; });
  var spends = log.map(function(e){ return e.spend  || 0; });
  var leads  = log.map(function(e){ return e.leads  || 0; });
  var isList = log.map(function(e){ return e.is != null ? e.is : null; });
  var temps   = log.map(function(e){ return e.temp != null ? e.temp : null; });
  var hasTemp = temps.some(function(v){ return v != null; });

  var maxI = Math.max.apply(null, imprs)  || 1;
  var maxS = Math.max.apply(null, spends) || 1;

  // Linear regression trend
  function trend(arr){
    var v = arr.filter(function(x){ return x != null && !isNaN(x); });
    if(v.length < 2) return 'flat';
    var n=v.length, sx2=0, sy2=0, sxy=0, sx1=0;
    v.forEach(function(y,x){ sx1+=x; sy2+=y; sxy+=x*y; sx2+=x*x; });
    var slope = (n*sxy - sx1*sy2) / Math.max(n*sx2 - sx1*sx1, 0.001);
    var avg = sy2/n;
    var pct = avg > 0 ? (slope/avg)*100 : 0;
    return pct > 5 ? 'up' : pct < -5 ? 'down' : 'flat';
  }

  var tI = trend(imprs);
  var tS = trend(spends);
  var tL = trend(leads);

  // Colors driven by trend
  function lineColor(t, invert){
    if(invert){ return t==='up'?'#ef4444': t==='down'?'#22c55e':'#94a3b8'; }
    return t==='up'?'#22c55e': t==='down'?'#ef4444':'#6366f1';
  }
  function fillColor(t, invert){
    if(invert){ return t==='up'?'rgba(239,68,68,0.07)': t==='down'?'rgba(34,197,94,0.07)':'rgba(148,163,184,0.05)'; }
    return t==='up'?'rgba(34,197,94,0.07)': t==='down'?'rgba(239,68,68,0.07)':'rgba(99,102,241,0.06)';
  }
  function tileColor(t, invert){
    if(invert){ return t==='up'?'#ef4444': t==='down'?'#22c55e':'#6b7280'; }
    return t==='up'?'#22c55e': t==='down'?'#ef4444':'#6b7280';
  }
  function arrow(t){ return t==='up'?'↑': t==='down'?'↓':'→'; }

  // Smooth bezier path
  function bezierPath(vals, maxV){
    var pts = vals.map(function(v,i){ return [sx(i), sy(v,maxV)]; });
    var d = 'M'+pts[0][0]+','+pts[0][1];
    for(var i=0; i<pts.length-1; i++){
      var cx = (pts[i][0]+pts[i+1][0])/2;
      d += ' C'+cx+','+pts[i][1]+' '+cx+','+pts[i+1][1]+' '+pts[i+1][0]+','+pts[i+1][1];
    }
    return d;
  }

  function makeArea(vals, maxV, fc){
    var d = bezierPath(vals, maxV);
    return '<path d="'+d+' L'+sx(N-1)+','+(PAD.t+CH)+' L'+PAD.l+','+(PAD.t+CH)+' Z" fill="'+fc+'"/>';
  }
  function makeLine(vals, maxV, sc, dash, w){
    return '<path d="'+bezierPath(vals,maxV)+'" fill="none" stroke="'+sc+'" stroke-width="'+(w||2.5)+'" stroke-linecap="round"'+(dash?' stroke-dasharray="'+dash+'"':'')+'/>';
  }

  // Smart labels: only first, last, peak, valley — series-aware offset to avoid overlap
  // usedLabels tracks {x, y} of already-placed labels so we can shift conflicting ones
  var usedLabels = [];
  function makeDots(vals, maxV, color, forceAbove){
    var hi = Math.max.apply(null,vals), lo = Math.min.apply(null,vals);
    var out = '';
    vals.forEach(function(v,i){
      var x = sx(i), y = sy(v,maxV);
      var isFirst = i===0, isLast = i===N-1;
      var isPeak = v===hi && i>0 && i<N-1;
      var isValley = v===lo && N>3 && i>0 && i<N-1;
      var showLabel = isFirst||isLast||isPeak||isValley;
      var r = showLabel ? 4 : 2.5;
      var fill = showLabel ? 'white' : color;
      out += '<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="'+fill+'" stroke="'+color+'" stroke-width="2"/>';
      if(showLabel){
        var lbl = maxV===maxS ? '$'+v.toFixed(0) : String(v);
        // Preferred position: above for peaks/first, below for valleys/last
        var wantAbove = forceAbove !== undefined ? forceAbove : (isPeak || isFirst);
        var lblY = wantAbove ? y-13 : y+19;
        // Check if any existing label is too close (within 18px x, 14px y)
        var conflict = usedLabels.some(function(u){ return Math.abs(u.x-x)<20 && Math.abs(u.y-lblY)<14; });
        if(conflict){ lblY = wantAbove ? y+19 : y-13; } // flip side
        // Still conflict? nudge further
        conflict = usedLabels.some(function(u){ return Math.abs(u.x-x)<20 && Math.abs(u.y-lblY)<14; });
        if(conflict){ lblY = wantAbove ? y-26 : y+32; }
        usedLabels.push({x:x, y:lblY});
        out += '<rect x="'+(x-18)+'" y="'+(lblY-10)+'" width="36" height="13" rx="3" fill="white" opacity="0.85"/>';
        out += '<text x="'+x+'" y="'+lblY+'" text-anchor="middle" font-size="10" fill="'+color+'" font-weight="700">'+lbl+'</text>';
      }
    });
    return out;
  }

  // Lead markers: vertical amber line + badge at top
  function makeLeadMarkers(){
    var out = '';
    leads.forEach(function(v,i){
      if(v<=0) return;
      var x = sx(i);
      out += '<line x1="'+x+'" y1="'+PAD.t+'" x2="'+x+'" y2="'+(PAD.t+CH)+'" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>';
      out += '<circle cx="'+x+'" cy="'+(PAD.t+7)+'" r="7" fill="#f59e0b" stroke="white" stroke-width="1.5"/>';
      out += '<text x="'+x+'" y="'+(PAD.t+11)+'" text-anchor="middle" font-size="8" fill="white" font-weight="800">'+v+'</text>';
    });
    return out;
  }

  // IS% as connected dots
  function makeISDots(){
    var pts = [];
    isList.forEach(function(v,i){ if(v!=null) pts.push([i,v]); });
    if(pts.length<2) return '';
    var out = '';
    for(var i=0; i<pts.length-1; i++){
      out += '<line x1="'+sx(pts[i][0])+'" y1="'+sy(pts[i][1],100)+'" x2="'+sx(pts[i+1][0])+'" y2="'+sy(pts[i+1][1],100)+'" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>';
    }
    pts.forEach(function(p,idx){
      var x=sx(p[0]), y=sy(p[1],100), v=p[1];
      var col = v<20?'#ef4444':v<40?'#f59e0b':'#10b981';
      out += '<circle cx="'+x+'" cy="'+y+'" r="3.5" fill="'+col+'" stroke="white" stroke-width="1.5"/>';
      if(idx===0||idx===pts.length-1){
        out += '<text x="'+x+'" y="'+(y-9)+'" text-anchor="middle" font-size="9" fill="'+col+'" font-weight="700">'+v+'%</text>';
      }
    });
    return out;
  }

  // Temperature overlay — right-side axis 0–120°F
  function makeTempLine(){
    var pts = [];
    temps.forEach(function(v,i){ if(v!=null) pts.push([i,v]); });
    if(pts.length < 2) return '';
    var maxT = 120;
    function ty(v){ return PAD.t + CH - (v/maxT)*CH; }
    var out = '';
    // Fill area under temp line — warm tint
    var areaD = 'M'+sx(pts[0][0])+','+ty(pts[0][1]);
    for(var i=1; i<pts.length; i++){
      var cx = (sx(pts[i-1][0])+sx(pts[i][0]))/2;
      areaD += ' C'+cx+','+ty(pts[i-1][1])+' '+cx+','+ty(pts[i][1])+' '+sx(pts[i][0])+','+ty(pts[i][1]);
    }
    areaD += ' L'+sx(pts[pts.length-1][0])+','+(PAD.t+CH)+' L'+sx(pts[0][0])+','+(PAD.t+CH)+' Z';
    out += '<path d="'+areaD+'" fill="rgba(251,146,60,0.08)"/>';
    // Line
    var lineD = 'M'+sx(pts[0][0])+','+ty(pts[0][1]);
    for(var j=1; j<pts.length; j++){
      var cx2 = (sx(pts[j-1][0])+sx(pts[j][0]))/2;
      lineD += ' C'+cx2+','+ty(pts[j-1][1])+' '+cx2+','+ty(pts[j][1])+' '+sx(pts[j][0])+','+ty(pts[j][1]);
    }
    out += '<path d="'+lineD+'" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.8"/>';
    // Dots + labels for first, last, peak, valley
    var vals = pts.map(function(p){ return p[1]; });
    var hi = Math.max.apply(null,vals), lo = Math.min.apply(null,vals);
    pts.forEach(function(p, idx){
      var x=sx(p[0]), y=ty(p[1]), v=p[1];
      var isFirst=idx===0, isLast=idx===pts.length-1;
      var isPeak=v===hi, isValley=v===lo&&pts.length>3;
      var show=isFirst||isLast||isPeak||isValley;
      var col = v>=90?'#dc2626':v>=70?'#f97316':'#3b82f6';
      out += '<circle cx="'+x+'" cy="'+y+'" r="'+(show?4:2.5)+'" fill="'+(show?'white':col)+'" stroke="'+col+'" stroke-width="1.5"/>';
      if(show){
        var lblY = (isPeak||isFirst) ? y-12 : y+17;
        out += '<text x="'+x+'" y="'+lblY+'" text-anchor="middle" font-size="9" fill="'+col+'" font-weight="700">'+v+'°</text>';
      }
    });
    return out;
  }

  // Grid
  var grid = '';
  for(var s=0;s<=4;s++){
    var gv = Math.round(maxI*s/4), gy = sy(gv,maxI);
    grid += '<line x1="'+PAD.l+'" y1="'+gy+'" x2="'+(PAD.l+CW)+'" y2="'+gy+'" stroke="#f3f4f6" stroke-width="1"/>';
    grid += '<text x="'+(PAD.l-8)+'" y="'+(gy+4)+'" text-anchor="end" font-size="9" fill="#d1d5db">'+gv+'</text>';
  }

  // X labels
  var xLbls = log.map(function(e,i){
    var show = N<=7 || i===0 || i===N-1 || i%Math.ceil(N/7)===0;
    if(!show) return '';
    var d2 = new Date(e.date+'T12:00:00');
    var lbl = d2.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return '<text x="'+sx(i)+'" y="'+(PAD.t+CH+20)+'" text-anchor="middle" font-size="10" fill="#9ca3af">'+lbl+'</text>';
  }).join('');

  var cI = lineColor(tI, false);
  var cS = lineColor(tS, true);

  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;" xmlns="http://www.w3.org/2000/svg">'
    + grid + xLbls
    + makeArea(imprs,  maxI, 'rgba(99,102,241,0.07)')
    + makeArea(spends, maxS, fillColor(tS, true))
    + makeLine(imprs,  maxI, '#6366f1', '', 2.5)
    + makeLine(spends, maxS, cS, '7,4', 2)
    + (nice(isList).length>=2 ? makeISDots() : '')
    + (hasTemp ? makeTempLine() : '')
    + makeLeadMarkers()
    + makeDots(imprs,  maxI, '#6366f1', true)
    + makeDots(spends, maxS, cS, false)
    + '<line x1="'+PAD.l+'" y1="'+PAD.t+'" x2="'+PAD.l+'" y2="'+(PAD.t+CH)+'" stroke="#e5e7eb" stroke-width="1"/>'
    + '<line x1="'+PAD.l+'" y1="'+(PAD.t+CH)+'" x2="'+(PAD.l+CW)+'" y2="'+(PAD.t+CH)+'" stroke="#e5e7eb" stroke-width="1"/>'
    + '</svg>';

  // Summary tiles
  var lastImpr  = imprs[N-1];
  var lastSpend = spends[N-1];
  var totalLeads = leads.reduce(function(a,b){return a+b;},0);
  var avgCPL = (function(){ var ts=0,tl=0; log.forEach(function(e){ts+=e.spend;tl+=e.leads;}); return tl>0?Math.round(ts/tl):null; })();
  var tSFull = trend(spends);
  var tCPL   = trend(log.map(function(e){ return e.leads>0?Math.round(e.spend/e.leads):null; }));

  var markers = [
    { lbl:'Impressions', val: String(lastImpr),              sub: 'Yesterday', t: tI,     inv: false },
    { lbl:'Spend',       val: '$'+lastSpend.toFixed(0),      sub: 'Yesterday', t: tSFull, inv: true  },
    { lbl:'Avg CPL',     val: avgCPL ? '$'+avgCPL : '—', sub: 'All time', t: tCPL,   inv: true  },
    { lbl:'Total Leads', val: String(totalLeads),            sub: 'Since reset', t: tL,   inv: false },
  ];

  var tiles = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;">';
  markers.forEach(function(m){
    var tc = tileColor(m.t, m.inv);
    var bg = m.t==='flat'?'var(--surface)': (m.t==='up'?(!m.inv?'#f0fdf4':'#fef2f2'): (!m.inv?'#fef2f2':'#f0fdf4'));
    tiles += '<div style="background:'+bg+';border:1px solid var(--border);border-radius:10px;padding:12px 14px;">'
      + '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;">'+m.lbl+'</div>'
      + '<div style="font-size:22px;font-weight:800;color:var(--stone);font-family:monospace;letter-spacing:-1px;">'+m.val+'</div>'
      + '<div style="font-size:11px;margin-top:4px;color:'+tc+';font-weight:700;">'+arrow(m.t)+' '+m.sub+'</div>'
      + '</div>';
  });
  tiles += '</div>';

  var isHas = nice(isList).length>=2;
  var legend = '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;margin-bottom:4px;font-size:11px;color:var(--muted);align-items:center;">'
    + '<span style="display:flex;align-items:center;gap:5px;"><svg width="20" height="4" style="overflow:visible"><line x1="0" y1="2" x2="20" y2="2" stroke="#6366f1" stroke-width="2.5"/></svg>Impressions</span>'
    + '<span style="display:flex;align-items:center;gap:5px;"><svg width="20" height="4" style="overflow:visible"><line x1="0" y1="2" x2="20" y2="2" stroke="'+cS+'" stroke-width="2" stroke-dasharray="6,4"/></svg>Spend</span>'
    + (isHas?'<span style="display:flex;align-items:center;gap:5px;"><svg width="20" height="4" style="overflow:visible"><line x1="0" y1="2" x2="20" y2="2" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3"/></svg>Imp. Share</span>':'')
    + (hasTemp?'<span style="display:flex;align-items:center;gap:5px;"><svg width="20" height="4" style="overflow:visible"><line x1="0" y1="2" x2="20" y2="2" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/></svg>Temp °F</span>':'')
    + '<span style="display:flex;align-items:center;gap:5px;"><svg width="12" height="12"><circle cx="6" cy="6" r="6" fill="#f59e0b"/></svg>Lead</span>'
    + '<span style="font-size:10px;">&#9632; <span style="color:#22c55e;font-weight:700;">Green</span> = trending well &nbsp; <span style="color:#ef4444;font-weight:700;">Red</span> = needs attention</span>'
    + '</div>';

  el.innerHTML = '<div class="card" style="margin-bottom:14px;">'
    + '<div class="card-head"><h3>Performance Trends</h3><p>Line color shows trend direction — green is improving, red needs attention.</p></div>'
    + '<div style="padding:16px 20px 4px;">' + svg + legend + '</div>'
    + '<div style="padding:4px 20px 16px;">' + tiles + '</div>'
    + '</div>';
}

function renderPerfLog(camp){
  var tilesEl  = document.getElementById('perf-summary-tiles');
  var tableEl  = document.getElementById('perf-weekly-table');
  if(!tilesEl || !tableEl) return;

  // Render trend chart and score chart
  renderTrendChart(camp);
  renderScoreChart(camp);

  if(!camp.perfLog || camp.perfLog.length === 0){
    tilesEl.innerHTML = '';
    tableEl.innerHTML = '';
    return;
  }

  // ── SUMMARY TILES
  var totalSpend=0, totalLeads=0, totalImpr=0, totalClicks=0;
  camp.perfLog.forEach(function(e){
    totalSpend+=e.spend; totalLeads+=e.leads;
    totalImpr+=e.impr; totalClicks+=e.clicks;
  });
  var avgCPL  = totalLeads>0 ? Math.round(totalSpend/totalLeads) : null;
  var ctr     = totalImpr>0  ? (totalClicks/totalImpr*100).toFixed(1) : null;
  var cplCls  = avgCPL===null?'neu':avgCPL<150?'good':avgCPL<500?'warn':'bad';
  var ctrCls  = ctr===null?'neu':parseFloat(ctr)>=5?'good':parseFloat(ctr)>=2?'warn':'bad';

  tilesEl.innerHTML = '<div class="tile-grid" style="margin-bottom:16px;">'
    + '<div class="tile neu"><div class="tile-lbl">Total Spend</div><div class="tile-val">$'+totalSpend.toFixed(0)+'</div><div class="tile-sub">'+camp.perfLog.length+' days logged</div></div>'
    + '<div class="tile neu"><div class="tile-lbl">Total Leads</div><div class="tile-val">'+totalLeads+'</div><div class="tile-sub">Calendly bookings</div></div>'
    + '<div class="tile '+cplCls+'"><div class="tile-lbl">Avg CPL</div><div class="tile-val">'+(avgCPL?'$'+avgCPL:'—')+'</div><div class="tile-sub">Cost per lead</div></div>'
    + '<div class="tile '+ctrCls+'"><div class="tile-lbl">Avg CTR</div><div class="tile-val">'+(ctr?ctr+'%':'—')+'</div><div class="tile-sub">Click-through rate</div></div>'
    + '</div>';

  // ── LOG TABLE with month filter
  if(!camp._perfLogMonth){
    var _months = getMonthsFromLog(camp.perfLog);
    camp._perfLogMonth = _months.length > 0 ? _months[0] : 'all';
  }
  var selectedPerfMonth = camp._perfLogMonth;
  var allRows = camp.perfLog.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
  var rows = selectedPerfMonth === 'all' ? allRows
    : allRows.filter(function(e){ return e.date.slice(0,7) === selectedPerfMonth; });

  // Build month selector HTML
  var _perfMonths = getMonthsFromLog(camp.perfLog);
  var monthOpts = '<option value="all"'+(selectedPerfMonth==='all'?' selected':'')+'>All Months</option>';
  _perfMonths.forEach(function(m){
    monthOpts += '<option value="'+m+'"'+(m===selectedPerfMonth?' selected':'')+'>'+monthLabel(m)+'</option>';
  });

  var tbl = '<div class="card" style="margin-bottom:16px;">'
    + '<div class="card-head" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">'
    + '<div><h3 style="margin:0;">Daily Log</h3><p style="margin:4px 0 0;">Logged entries, newest first</p></div>'
    + '<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);">Month:'
    + '<select onchange="(function(v){ getCamp(activeCampId)._perfLogMonth=v; renderPerfLog(getCamp(activeCampId)); })(this.value)" style="font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-family:inherit;color:var(--stone);background:var(--white);cursor:pointer;">'
    + monthOpts + '</select></div></div>'
    + '<div style="overflow-x:auto;"><table class="bt" style="min-width:640px;">'
    + '<thead><tr><th style="text-align:left;">Date</th><th style="text-align:right;">Impr.</th><th style="text-align:right;">Clicks</th><th style="text-align:right;">Spend</th><th style="text-align:right;">Leads</th><th style="text-align:right;">CTR</th><th style="text-align:right;">CPL</th><th style="text-align:right;">CPC</th><th style="text-align:right;">IS%</th><th style="text-align:right;">QS</th><th style="text-align:right;">G.Conv</th><th></th></tr></thead><tbody>';

  if(rows.length === 0){
    tbl += '<tr><td colspan="12" style="padding:20px;text-align:center;color:var(--muted);font-size:12px;">No entries for this month.</td></tr>';
  } else {
    rows.forEach(function(e){
      var cpl = e.leads>0 ? '$'+Math.round(e.spend/e.leads) : '—';
      var ctrVal = e.ctr!=null ? e.ctr.toFixed(2)+'%' : (e.impr>0&&e.clicks>0 ? (e.clicks/e.impr*100).toFixed(2)+'%' : '—');
      var ctrCls = ctrVal==='—' ? '' : (parseFloat(ctrVal)>=5 ? 'style="color:var(--green);font-weight:700;"' : parseFloat(ctrVal)>=2 ? 'style="color:var(--amber);font-weight:700;"' : 'style="color:var(--red);font-weight:700;"');
      var isCls = e.is===null||e.is===undefined?'':e.is<20?'style="color:var(--red);font-weight:700;"':e.is<40?'style="color:var(--amber);font-weight:700;"':'style="color:var(--green);font-weight:700;"';
      var qsCls = e.qs===null||e.qs===undefined?'':e.qs<5?'style="color:var(--red);font-weight:700;"':e.qs<7?'style="color:var(--amber);font-weight:700;"':'style="color:var(--green);font-weight:700;"';
      var dateStr = new Date(e.date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',weekday:'short'});
      tbl += '<tr>'
        + '<td style="font-weight:600;white-space:nowrap;">'+dateStr+'</td>'
        + '<td style="text-align:right;">'+e.impr+'</td>'
        + '<td style="text-align:right;">'+e.clicks+'</td>'
        + '<td style="text-align:right;">$'+e.spend.toFixed(0)+'</td>'
        + '<td style="text-align:right;font-weight:700;">'+e.leads+'</td>'
        + '<td style="text-align:right;" '+ctrCls+'>'+ctrVal+'</td>'
        + '<td style="text-align:right;">'+cpl+'</td>'
        + '<td style="text-align:right;">'+(e.cpc!=null?'$'+e.cpc.toFixed(2):'—')+'</td>'
        + '<td style="text-align:right;" '+isCls+'>'+(e.is!=null?e.is+'%':'—')+'</td>'
        + '<td style="text-align:right;" '+qsCls+'>'+(e.qs!=null?e.qs:'—')+'</td>'
        + '<td>'+(e.gconv!=null?e.gconv:'—')+'</td>'
        + '<td style="white-space:nowrap;">'
        + '<button onclick="loadDIEntry('+JSON.stringify(e).replace(/"/g,"&quot;")+')" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);padding:2px 5px;" title="Edit">✎</button>'
        + '<button onclick="removePerfEntry(&quot;'+e.date+'&quot;)" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--red);padding:2px 5px;" title="Remove">×</button>'
        + '</td></tr>';
    });
  }

  tbl += '</tbody></table></div>'
    + '<div style="padding:10px 20px;border-top:1px solid var(--border-lt);font-size:10px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;">'
    + '<span><span style="color:var(--red);font-weight:700;">Red IS%</span> = under 20%</span>'
    + '<span><span style="color:var(--amber);font-weight:700;">Amber IS%</span> = 20–40%</span>'
    + '<span><span style="color:var(--green);font-weight:700;">Green IS%</span> = 40%+</span>'
    + '<span><span style="color:var(--red);font-weight:700;">Red G.Conv</span> = mismatch with logged leads</span>'
    + '</div></div>';

  tableEl.innerHTML = tbl;
}


async function saveAnalysis(campId, type, text){
  var key = 'ai_history_' + campId + '_' + type;
  // Load existing history
  var history = [];
  try { history = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){}
  var date = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  history.unshift({ date: date, text: text });
  if(history.length > 8) history = history.slice(0, 8);
  // Save to localStorage immediately
  localStorage.setItem(key, JSON.stringify(history));
  // Sync to Supabase in background
  try {
    await sbUpsert('ai_memory', {
      id: key,
      camp_id: campId,
      mem_type: type,
      history: JSON.stringify(history),
      updated_at: new Date().toISOString()
    });
  } catch(e){ /* Supabase unavailable, localStorage copy is fine */ }
}

async function loadAnalysisFromSB(campId, type){
  var key = 'ai_history_' + campId + '_' + type;
  try {
    var rows = await sbGet('ai_memory', {col:'id', val: key});
    if(rows && rows.length > 0){
      var history = JSON.parse(rows[0].history || '[]');
      localStorage.setItem(key, JSON.stringify(history));
      return history;
    }
  } catch(e){}
  // Fall back to localStorage
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){ return []; }
}

function getAnalysisHistory(campId, type){
  // Sync read from localStorage (Supabase loaded async at tab open)
  var key = 'ai_history_' + campId + '_' + type;
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){ return []; }
}

function buildHistoryContext(campId, type, label){
  var history = getAnalysisHistory(campId, type);
  if(!history.length) return '';
  var lines = history.map(function(h, i){
    return 'Analysis from ' + h.date + ':\n' + h.text.replace(/<[^>]+>/g,'').replace(/&nbsp;/g,' ').substring(0, 600) + (h.text.length > 600 ? '...' : '');
  });
  return '\n\nPAST ' + label.toUpperCase() + ' (most recent first — use this for continuity and to track progress over time):\n' + lines.join('\n\n---\n\n');
}

async function getPerfAI(){
  var camp = getCamp(activeCampId);
  var btn     = document.getElementById('perf-ai-btn');
  var loading = document.getElementById('perf-ai-loading');
  var output  = document.getElementById('perf-ai-output');
  if(!loading || !output) return;
  var noData = document.getElementById('perf-ai-no-data');
  if(!camp || !camp.perfLog || camp.perfLog.length === 0){
    loading.style.display = 'none';
    if(output) output.style.display = 'none';
    if(noData) noData.style.display = 'block';
    return;
  }
  if(noData) noData.style.display = 'none';
  output.style.display = 'none';
  output.innerHTML = '';
  loading.style.display = 'block';

  var days = getDaysFor(camp.resetDate);
  var logSummary = camp.perfLog.map(function(e){
    var cpl = e.leads > 0 ? '$'+Math.round(e.spend/e.leads) : 'no leads';
    var extras = [];
    if(e.cpc  != null) extras.push('CPC $'+e.cpc.toFixed(2));
    if(e.is   != null) extras.push('IS '+e.is+'%');
    if(e.qs   != null) extras.push('QS '+e.qs);
    if(e.gconv!= null) extras.push('G.Conv '+e.gconv);
    return e.date+': '+e.impr+' impr, '+e.clicks+' clicks, $'+e.spend.toFixed(0)+' spend, '+e.leads+' leads, CPL '+cpl+(extras.length?' ('+extras.join(', ')+')':'');
  }).join('\n');

  var totalSpend=0, totalLeads=0;
  camp.perfLog.forEach(function(e){ totalSpend+=e.spend; totalLeads+=e.leads; });
  var avgCPL = totalLeads>0 ? Math.round(totalSpend/totalLeads) : null;

  var kchCtx = 'CRITICAL BUSINESS CONTEXT — apply this before any analysis:\n'
    + '- KCH sells premium hardscape (patios, retaining walls, outdoor kitchens). Average project revenue $50,000-$60,000 with ~10% profit margin (~$5,500/project). Each Calendly booking is highly valuable — even $1,000+ acquisition cost is very profitable.\n'
    + '- This is a CONSIDERED PURCHASE. Customers research for days or weeks before booking a consultation.\n'
    + '- Realistic Calendly bookings: 1-3 per WEEK is excellent. 1-2 per week is healthy. Zero bookings in a day or even a week is completely normal — NOT a failure.\n'
    + '- NEVER flag zero daily leads as a problem. Lead volume is a weekly and monthly metric, not daily.\n'
    + '- CONVERSION SETUP: The only conversion tracked in Google Ads is a GA4 micro-conversion (3 page views on site). This is an algorithm-training signal, NOT a booking.\n'
    + '- Calendly bookings are the real business outcome, tracked manually outside Google Ads. 2 bookings were recorded recently — that is a strong result for this stage.\n'
    + '- Daily signals that actually matter: CTR (5%+ is strong for hardscape), IS% (want it trending up), CPC (under $25 is healthy), spend vs budget ratio.\n';
  var recentChangesPerf = (camp.campaignLog||[]).filter(function(e){ return e.type==='Change'; }).slice(-5).map(function(e){
    var s = e.date+' — '+(e.cat||'Change')+': '+e.text;
    if(e.why) s += ' (Why: '+e.why+')';
    if(e.outcome) s += ' [Outcome: '+e.outcome+']';
    return s;
  }).join('\n') || 'No changes logged.';

  var prompt = 'You are a Google Ads analyst advising Kansas City Hardscapes (KCH), a premium hardscape contractor in KC metro. Daily budget: $'+camp.budget+'. Campaign reset '+camp.resetDate+'. Currently Day '+days+' of learning phase recovery.\n\n'
    + kchCtx + '\n'
    + 'DAILY PERFORMANCE LOG:\n'+logSummary+'\n\n'
    + 'TOTALS: $'+totalSpend.toFixed(0)+' spend, '+totalLeads+' leads, avg CPL '+(avgCPL?'$'+avgCPL:'N/A')+'\n\n'
    + 'RECENT CAMPAIGN CHANGES:\n'+recentChangesPerf+'\n\n'
    + 'Write a plain-English performance summary covering:\n'
    + '1. TREND — Is CTR, IS%, and spend efficiency improving, declining, or flat?\n'
    + '2. RECOVERY PROGRESS — Is the algorithm behaving as expected for Day '+days+'?\n'
    + '3. WHAT STANDS OUT — One or two specific data points worth attention. Do not flag zero daily leads.\n'
    + '4. THIS WEEK — One concrete, specific action based on the actual numbers.\n\n'
    + 'Write directly to the business owner. Be encouraging where the data supports it. Honest and specific. Under 300 words.'
    + buildHistoryContext(camp.id, 'perf', 'performance trend analyses');

  // Timeout safety — never spin forever
  var timedOut = false;
  var timer = setTimeout(function(){
    timedOut = true;
    if(loading) loading.style.display = 'none';
    if(output){
      output.innerHTML = '<div style="padding:12px 16px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca;font-size:13px;color:#991b1b;">AI timed out. Check your connection and click ↻ Refresh.</div>';
      output.style.display = 'block';
    }
  }, 20000);

  try {
    var text = await callAI(prompt, 800);
    clearTimeout(timer);
    if(timedOut) return;
    aiDone(loading);
    if(output){
      output.innerHTML = aiFormat(text);
      output.style.display = 'block';
    }
    await saveAnalysis(camp.id, 'perf', text);
  } catch(e) {
    clearTimeout(timer);
    if(timedOut) return;
    aiDone(loading);
    if(output){
      output.innerHTML = '<div style="padding:12px 16px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca;font-size:13px;color:#991b1b;">Could not reach AI. Check your connection and click ↻ Refresh to try again.</div>';
      output.style.display = 'block';
    }
  }
}

var CPA_STEPS = [
  { id:'cpa1', dates:'Mar 26 – Apr 1',  cpa:'$35', label:'Switch to Target CPA',  note:'First 7 days. Expect a mini learning phase — some volatility is normal. Do not adjust anything.' },
  { id:'cpa2', dates:'Apr 2 – Apr 8',   cpa:'$35', label:'Hold at $35',            note:'Stability check week. G.Conv staying consistent? CPL holding? If yes, ready to tighten next week.' },
  { id:'cpa3', dates:'Apr 9 – Apr 15',  cpa:'$30', label:'Tighten to $30',         note:'First reduction. Watch impressions and G.Conv for 5–7 days before moving again.' },
  { id:'cpa4', dates:'Apr 16 – Apr 22', cpa:'$27', label:'Tighten to $27',         note:'Getting close. If impressions drop noticeably after this change, step back to $30 and hold.' },
  { id:'cpa5', dates:'Apr 23 – Apr 29', cpa:'$24', label:'Tighten to $24 — Goal',  note:'Back to pre-reset Target CPA. This is where you were running 10k impressions and 100+ clicks per day.' },
];

function cpaSaveData(){
  var data = {};
  CPA_STEPS.forEach(function(s){
    var cb = document.getElementById('cb-'+s.id);
    var ta = document.getElementById('note-'+s.id);
    data[s.id] = { done: cb ? cb.checked : false, log: ta ? ta.value : '' };
  });
  try { localStorage.setItem('kch_cpa_forecast', JSON.stringify(data)); } catch(e){}
  cpaUpdateProgress();
}

function cpaLoadData(){
  var data = {};
  try { data = JSON.parse(localStorage.getItem('kch_cpa_forecast') || '{}'); } catch(e){}
  return data;
}

function cpaUpdateProgress(){
  var done = 0;
  CPA_STEPS.forEach(function(s){
    var cb = document.getElementById('cb-'+s.id);
    if(cb && cb.checked) done++;
    var row = document.getElementById('row-'+s.id);
    if(row){
      if(cb && cb.checked){
        row.style.opacity = '0.5';
        row.style.background = '';
      } else {
        row.style.opacity = '1';
      }
    }
  });
  var pct = Math.round((done / CPA_STEPS.length) * 100);
  var bar = document.getElementById('cpa-prog-bar');
  var lbl = document.getElementById('cpa-prog-lbl');
  if(bar) bar.style.width = pct + '%';
  if(lbl) lbl.textContent = done + ' of ' + CPA_STEPS.length + ' steps complete';
}

function buildCPAForecast(){
  var saved = cpaLoadData();

  var cards = CPA_STEPS.map(function(s, i){
    var d = saved[s.id] || {};
    var checked = d.done ? 'checked' : '';
    var logVal = (d.log || '').replace(/"/g,'&quot;');
    var isGoal = i === CPA_STEPS.length - 1;
    var accentColor = isGoal ? '#16a34a' : '#2563eb';
    return '<div id="row-'+s.id+'" style="border:1px solid var(--border-lt);border-radius:10px;padding:16px 18px;margin-bottom:12px;transition:opacity .3s;">'
      + '<div style="display:flex;align-items:flex-start;gap:14px;">'
      + '<input type="checkbox" id="cb-'+s.id+'" '+checked+' style="width:18px;height:18px;margin-top:2px;cursor:pointer;accent-color:'+accentColor+';flex-shrink:0;" onchange="cpaSaveData()">'
      + '<div style="flex:1;">'
      + '<div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px;">'
      + '<span style="font-size:22px;font-weight:800;color:var(--stone);">'+s.cpa+'</span>'
      + '<span style="font-weight:600;font-size:13px;color:var(--stone);">'+s.label+'</span>'
      + '<span style="font-size:11px;color:var(--muted);margin-left:auto;">'+s.dates+'</span>'
      + '</div>'
      + '<p style="font-size:12px;color:var(--muted);margin:0 0 10px;line-height:1.6;">'+s.note+'</p>'
      + '<textarea id="note-'+s.id+'" placeholder="End of period notes — what happened, was it stable, any issues..." style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;color:var(--stone);resize:vertical;min-height:52px;box-sizing:border-box;" oninput="cpaSaveData()">'+logVal+'</textarea>'
      + '</div></div></div>';
  }).join('');

  var html = '<div style="padding:20px 20px 0;">'
    + '<div style="margin-bottom:18px;">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'
    + '<span style="font-size:13px;font-weight:600;color:var(--stone);">Progress toward $24</span>'
    + '<span id="cpa-prog-lbl" style="font-size:11px;color:var(--muted);">0 of 5 steps complete</span>'
    + '</div>'
    + '<div style="height:7px;background:var(--border-lt);border-radius:4px;overflow:hidden;">'
    + '<div id="cpa-prog-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#2563eb,#16a34a);border-radius:4px;transition:width .4s;"></div>'
    + '</div></div>'
    + cards
    + '</div>';

  setTimeout(function(){ cpaUpdateProgress(); }, 50);
  return html;
}
