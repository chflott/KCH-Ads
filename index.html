<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KCH — Google Ads Command Center</title>
<style>
:root{
  --navy:#0f2557;
  --navy-lt:#1a3a7a;
  --stone:#1c1c1c;
  --stone-mid:#444;
  --gold:#b8860b;
  --gold-lt:#fdf8ee;
  --gold-border:#e2c96e;
  --green:#155e3e;
  --green-lt:#f0faf5;
  --green-border:#6ee7b7;
  --red:#991b1b;
  --red-lt:#fff5f5;
  --red-border:#fca5a5;
  --amber:#78350f;
  --amber-lt:#fffbeb;
  --amber-border:#fcd34d;
  --blue:#1e3a8a;
  --blue-lt:#f0f5ff;
  --blue-border:#bfdbfe;
  --border:#e0dbd2;
  --muted:#6b6560;
  --bg:#f4f2ef;
  --surface:#faf9f7;
  --white:#fff;
}
html,body{margin:0;padding:0;background:var(--bg);}
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

/* ── HEADER ── */
.hdr{background:var(--navy);padding:20px 24px 18px;}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.hdr-logo{width:36px;height:36px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0;}
.hdr-title{font-size:18px;font-weight:800;color:#fff;line-height:1.1;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;}
.hdr-back{display:none;align-items:center;gap:8px;color:rgba(255,255,255,.6);font-size:12px;font-weight:600;cursor:pointer;padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.15);transition:all .2s;background:none;}
.hdr-back:hover{background:rgba(255,255,255,.08);color:#fff;}
.hdr-campaign-name{font-size:13px;font-weight:700;color:var(--gold);display:none;}

/* ── VIEWS ── */
#view-dashboard{display:block;}
#view-campaign{display:none;}

/* ── DASHBOARD ── */
.dash-wrap{padding:24px;}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.dash-header h2{font-size:18px;font-weight:800;color:var(--stone);margin:0;}
.dash-header p{font-size:12px;color:var(--muted);margin:4px 0 0;}
.btn{display:inline-flex;align-items:center;padding:9px 20px;border-radius:7px;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .18s;letter-spacing:.2px;}
.btn-gold{background:var(--gold);color:#fff;}
.btn-gold:hover{background:#9a7009;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:11px;padding:7px 16px;}
.btn-ghost:hover{background:var(--surface);color:var(--stone);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy-lt);}

/* ── CAMPAIGN CARDS ── */
.campaign-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:24px;}
.camp-card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;}
.camp-card:hover{border-color:var(--gold);box-shadow:0 4px 20px rgba(184,134,11,.12);transform:translateY(-1px);}
.camp-card-top{padding:16px 18px 14px;border-bottom:1px solid #f5f3ef;}
.camp-card-type{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
.camp-card-name{font-size:15px;font-weight:800;color:var(--stone);margin-bottom:4px;}
.camp-card-meta{font-size:11px;color:var(--muted);}
.camp-card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;}
.camp-stat{padding:12px 14px;text-align:center;border-right:1px solid #f5f3ef;}
.camp-stat:last-child{border-right:none;}
.camp-stat-val{font-size:16px;font-weight:800;color:var(--stone);line-height:1;}
.camp-stat-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-top:4px;}
.camp-card-foot{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
.camp-status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.camp-status-text{font-size:11px;font-weight:700;}
.camp-open-btn{font-size:11px;font-weight:700;color:var(--navy);background:none;border:none;cursor:pointer;padding:0;}

/* Status colors */
.status-learning{background:#f59e0b;} .status-learning-text{color:#92400e;}
.status-active{background:#22c55e;} .status-active-text{color:#166534;}
.status-paused{background:#9ca3af;} .status-paused-text{color:#6b7280;}
.status-issue{background:#ef4444;} .status-issue-text{color:#991b1b;}

/* ── ADD CAMPAIGN CARD ── */
.add-camp-card{background:var(--white);border:2px dashed var(--border);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;cursor:pointer;transition:all .2s;min-height:160px;}
.add-camp-card:hover{border-color:var(--gold);background:var(--gold-lt);}
.add-camp-card div:first-child{font-size:28px;margin-bottom:8px;color:var(--muted);}
.add-camp-card div:last-child{font-size:12px;font-weight:700;color:var(--muted);}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border-radius:14px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h3{font-size:18px;font-weight:800;margin:0 0 6px;}
.modal p{font-size:12px;color:var(--muted);margin:0 0 20px;line-height:1.6;}
.mf label{display:block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.mf{margin-bottom:14px;}
.mf input,.mf select,.mf textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;color:var(--stone);background:var(--surface);outline:none;transition:border-color .18s;font-family:inherit;}
.mf input:focus,.mf select:focus,.mf textarea:focus{border-color:var(--gold);background:var(--white);}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px;}
.type-opt{border:2px solid var(--border);border-radius:8px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;}
.type-opt:hover{border-color:var(--gold);}
.type-opt.selected{border-color:var(--navy);background:var(--blue-lt);}
.type-opt-icon{font-size:20px;margin-bottom:4px;}
.type-opt-label{font-size:10px;font-weight:700;color:var(--stone);}
.type-opt-sub{font-size:9px;color:var(--muted);margin-top:2px;}

/* ── CAMPAIGN WORKSPACE ── */
.camp-wrap{display:flex;flex-direction:column;height:100%;}
.tabs{display:flex;background:var(--white);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:90px;padding:13px 8px;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab.active{color:var(--stone);border-bottom-color:var(--gold);}
.tab:hover:not(.active){color:var(--stone);background:#fafaf8;}
.tab-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#ef4444;margin-right:5px;vertical-align:middle;margin-bottom:1px;}
.wrap{padding:20px 20px 56px;}
.screen{display:none;}
.screen.active{display:block;}

/* ── CONTENT ELEMENTS ── */
.slbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:22px 0 10px;padding-left:2px;}
.card{background:var(--white);border-radius:10px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;}
.card-head{padding:15px 18px 11px;border-bottom:1px solid var(--border);}
.card-head h3{font-size:14px;font-weight:800;margin:0 0 3px;color:var(--stone);}
.card-head p{font-size:11px;color:var(--muted);margin:0;line-height:1.5;}
.card-body{padding:15px 18px;}
.alert{border-radius:8px;padding:12px 15px;font-size:12px;line-height:1.7;margin-bottom:14px;border:1px solid;}
.alert-gold{background:var(--gold-lt);border-color:var(--gold-border);color:#5c3d00;}
.alert-red{background:var(--red-lt);border-color:var(--red-border);color:#7f1d1d;}
.alert-blue{background:var(--blue-lt);border-color:var(--blue-border);color:#1e3a8a;}
.alert-neutral{background:var(--surface);border-color:var(--border);color:var(--stone);}
.alert strong{font-weight:800;display:block;margin-bottom:2px;font-size:13px;}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sym{position:relative;}
.sym::before{content:attr(data-s);position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);font-family:monospace;pointer-events:none;}
.sym input{padding-left:24px;}
.tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.tile{border-radius:9px;padding:13px 15px;border:1px solid var(--border);background:var(--surface);}
.tile-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px;}
.tile-val{font-size:22px;font-weight:800;line-height:1;color:var(--stone);}
.tile-sub{font-size:10px;font-weight:600;margin-top:5px;color:var(--muted);}
.tile.good{background:var(--green-lt);border-color:var(--green-border);}
.tile.warn{background:var(--amber-lt);border-color:var(--amber-border);}
.tile.bad{background:var(--red-lt);border-color:var(--red-border);}
.tile.neu{background:var(--surface);border-color:var(--border);}
.rstep{display:flex;align-items:flex-start;gap:14px;padding:15px 18px;border-bottom:1px solid #f5f3ef;cursor:pointer;transition:background .15s;}
.rstep:last-child{border-bottom:none;}
.rstep:hover{background:var(--surface);}
.rstep.done{background:var(--green-lt);}
.rnum{width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--muted);flex-shrink:0;margin-top:1px;transition:all .2s;}
.rstep.done .rnum{background:var(--green);border-color:var(--green);color:#fff;}
.rstep.done .rnum::after{content:'✓';}
.rstep.done .rnum span{display:none;}
.ri{flex:1;}
.rt{font-size:13px;font-weight:700;line-height:1.35;color:var(--stone);}
.rstep.done .rt{text-decoration:line-through;color:var(--muted);font-weight:400;}
.rd{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.65;}
.rnote{font-size:11px;color:var(--amber);background:var(--amber-lt);border-left:3px solid #f59e0b;padding:8px 11px;border-radius:0 6px 6px 0;margin-top:9px;line-height:1.6;}
.rnote strong{font-weight:700;}
.dont-row{display:flex;align-items:flex-start;gap:12px;padding:13px 18px;border-bottom:1px solid #f5f3ef;}
.dont-row:last-child{border-bottom:none;}
.dont-icon{font-size:12px;font-weight:800;color:var(--red);min-width:16px;margin-top:2px;flex-shrink:0;}
.dont-text strong{font-size:13px;font-weight:700;display:block;margin-bottom:3px;color:var(--stone);}
.dont-text p{font-size:12px;color:var(--muted);line-height:1.6;margin:0;}
.cl{list-style:none;margin:0;padding:0;}
.cl li{display:flex;align-items:flex-start;gap:12px;padding:13px 18px;border-bottom:1px solid #f5f3ef;cursor:pointer;transition:background .15s;}
.cl li:last-child{border-bottom:none;}
.cl li:hover{background:var(--surface);}
.cl li.done{background:var(--green-lt);}
.chk{width:22px;height:22px;min-width:22px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;margin-top:1px;transition:all .2s;flex-shrink:0;}
.cl li.done .chk{background:var(--green);border-color:var(--green);}
.cl li.done .chk::after{content:'✓';}
.ci{flex:1;min-width:0;}
.ct{font-size:13px;font-weight:700;line-height:1.3;color:var(--stone);}
.cl li.done .ct{text-decoration:line-through;color:var(--muted);font-weight:400;}
.cd{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.65;}
.cnote{font-size:11px;color:var(--amber);background:var(--amber-lt);border-left:3px solid #f59e0b;padding:7px 10px;border-radius:0 6px 6px 0;margin-top:8px;line-height:1.6;}
.ctag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0;margin-top:2px;letter-spacing:.3px;}
.tag-priority{background:#fee2e2;color:#9b1c1c;}
.tag-strategic{background:var(--blue-lt);color:var(--blue);}
.tag-growth{background:var(--green-lt);color:var(--green);}
.prog-wrap{padding:15px 18px 13px;}
.prog-row{display:flex;justify-content:space-between;margin-bottom:8px;}
.prog-lbl{font-size:12px;font-weight:700;color:var(--stone);}
.prog-num{font-size:12px;color:var(--muted);font-family:monospace;}
.prog-bg{background:#ece8e0;border-radius:99px;height:6px;overflow:hidden;}
.prog-fill{height:6px;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--green));transition:width .4s;}
.done-banner{display:none;background:var(--green);color:#fff;border-radius:8px;padding:14px 18px;margin-bottom:14px;text-align:center;}
.done-banner.show{display:block;}
.done-banner strong{display:block;font-size:14px;margin-bottom:3px;}
.done-banner p{font-size:12px;opacity:.8;margin:0;}
.jcalc{background:var(--stone);border-radius:10px;padding:18px 20px;margin-bottom:12px;}
.jcalc h3{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:0 0 14px;}
.jrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.jrow:last-child{border-bottom:none;padding-top:12px;margin-top:4px;}
.jlbl{font-size:12px;color:rgba(255,255,255,.55);}
.jval{font-size:14px;font-weight:800;color:#fff;font-family:monospace;}
.jval.gold{color:var(--gold);}
.jval.green{color:#4ade80;}
.jdiv{height:1px;background:rgba(255,255,255,.1);margin:6px 0;}
.verdict{display:none;border-radius:10px;padding:18px;border:1px solid;margin-top:0;}
.verdict.show{display:block;}
.v-bad{background:var(--red-lt);border-color:var(--red-border);}
.v-warn{background:var(--amber-lt);border-color:var(--amber-border);}
.v-good{background:var(--green-lt);border-color:var(--green-border);}
.verdict h4{font-size:15px;font-weight:800;margin:0 0 8px;color:var(--stone);}
.verdict .vbody{font-size:12px;line-height:1.75;color:var(--stone);}
.vaction{margin-top:12px;padding:11px 13px;background:rgba(0,0,0,.05);border-radius:7px;}
.vaction-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;}
.vaction p{font-size:12px;line-height:1.65;margin:0;color:var(--stone);}
.bm{width:100%;border-collapse:collapse;font-size:12px;}
.bm th{text-align:left;padding:9px 12px;background:var(--surface);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:2px solid var(--border);}
.bm th:not(:first-child){text-align:center;}
.bm td{padding:11px 12px;border-bottom:1px solid #f5f3ef;vertical-align:top;font-size:12px;}
.bm tr:last-child td{border-bottom:none;}
.bm td:not(:first-child){text-align:center;font-weight:700;}
.c-bad{color:#dc2626;}.c-warn{color:#d97706;}.c-good{color:#16a34a;}
.bm-sub{font-size:10px;color:var(--muted);font-weight:400;margin-top:2px;}
.bt{width:100%;border-collapse:collapse;font-size:12px;}
.bt th{text-align:left;padding:9px 12px;background:var(--surface);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:2px solid var(--border);}
.bt td{padding:11px 12px;border-bottom:1px solid #f5f3ef;vertical-align:top;}
.bt tr:last-child td{border-bottom:none;}
.bt-metric{font-size:16px;font-weight:800;color:var(--stone);}
.bt-note{font-size:11px;color:var(--muted);line-height:1.6;margin-top:2px;}
.notes-area{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:7px;font-size:13px;color:var(--stone);background:var(--surface);resize:vertical;min-height:88px;outline:none;transition:border-color .18s;font-family:inherit;line-height:1.6;}
.notes-area:focus{border-color:var(--gold);background:var(--white);}
.btn-row{display:flex;align-items:center;margin-top:12px;gap:10px;}
.saved{font-size:11px;color:var(--green);display:none;margin-left:4px;font-weight:600;}
.pstep{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;z-index:1;}
.pdot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--muted);transition:all .3s;cursor:default;}
.pdot.done{background:var(--green);border-color:var(--green);color:#fff;}
.pdot.active{background:var(--gold);border-color:var(--gold);color:#fff;}
.plbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);text-align:center;line-height:1.3;}
.plbl.active{color:var(--stone);}
.signal-row{display:flex;align-items:flex-start;gap:13px;padding:14px 18px;border-bottom:1px solid #f5f3ef;}
.signal-row:last-child{border-bottom:none;}
.sdot{width:9px;height:9px;min-width:9px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.dot-r{background:#ef4444;}.dot-a{background:#f59e0b;}.dot-g{background:#22c55e;}
.signal-row strong{font-size:13px;font-weight:700;display:block;margin-bottom:4px;color:var(--stone);}
.signal-row p{font-size:12px;color:var(--muted);line-height:1.65;margin:0;}
.season-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.mo{border-radius:7px;padding:10px 5px;text-align:center;}
.mo-name{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.mo-bar{height:4px;border-radius:99px;margin:5px auto;}
.mo-status{font-size:8px;font-weight:700;line-height:1.3;}
.mo-hot{background:#fef3c7;color:#92400e;}
.mo-warm{background:var(--green-lt);color:#166534;}
.mo-cold{background:var(--surface);color:#9ca3af;}
.kw-filter-btn{padding:6px 14px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s;}
.kw-filter-btn:hover{background:var(--surface);color:var(--stone);}
.kw-filter-btn.kw-f-active{background:var(--stone);color:#fff;border-color:var(--stone);}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-brand">
      <div class="hdr-logo" id="hdr-logo" style="cursor:pointer;">KCH</div>
      <div>
        <div class="hdr-title">Kansas City Hardscapes</div>
        <div class="hdr-sub">Google Ads Command Center</div>
      </div>
    </div>
    <button class="hdr-back" id="hdr-back">&#8592; All Campaigns</button>
  </div>
  <div class="hdr-campaign-name" id="hdr-campaign-name"></div>
</div>

<!-- HOME PAGE -->
<div id="page-home">
  <div class="dash-wrap">
    <div class="dash-header">
      <div>
        <h2>Campaigns</h2>
        <p>Click a campaign to open its workspace.</p>
      </div>
      <button class="btn btn-gold" id="btn-add-campaign">+ New Campaign</button>
    </div>
    <div class="campaign-grid" id="campaign-grid"></div>
  </div>
</div>

<!-- CAMPAIGN PAGE -->
<div id="page-campaign" style="display:none;">
  <div class="tabs" id="camp-tabs"></div>
  <div class="wrap" id="camp-screens"></div>
</div>

<!-- ADD CAMPAIGN MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Add Campaign</h3>
    <p>Create a new campaign workspace.</p>
    <div class="mf">
      <label>Campaign Name</label>
      <input type="text" id="new-camp-name" placeholder="e.g. KCH — Retargeting Spring 2026">
    </div>
    <div class="mf">
      <label>Campaign Type</label>
      <div class="type-grid">
        <div class="type-opt selected" id="type-search">
          <div class="type-opt-icon">&#128269;</div>
          <div class="type-opt-label">Search</div>
          <div class="type-opt-sub">Keyword-based</div>

<script>
// ── STORAGE ──────────────────────────────
function save(key, val) {
  try { localStorage.setItem('kch_' + key, JSON.stringify(val)); } catch(e) {}
}
function load(key, def) {
  try {
    var v = localStorage.getItem('kch_' + key);
    return (v !== null) ? JSON.parse(v) : def;
  } catch(e) { return def; }
}

// ── DATA ─────────────────────────────────
var DEFAULT_CAMPAIGN = {
  id: 'kch-search-001',
  name: 'Main Adwords Campaign for KCH',
  type: 'search',
  budget: 145,
  status: 'learning',
  notes: '',
  stats: {spend:0, leads:0, cpl:0},
  resetDate: '2026-03-02',
  phase: 0,
  logEntries: [],
  keywords: [],
  changes: [{
    id: 1741000000000,
    date: '2026-03-02',
    cat: 'Bidding Strategy',
    what: 'Switched to Maximize Conversions, removed Target CPA',
    why: 'Learning phase reset after conversion goal change.',
    expected: 'Impressions should return within 5-7 days.',
    outcome: ''
  }],
  negatives: [
    {text:'DIY patio',added:false},{text:'cheap pavers',added:false},
    {text:'how to build a patio',added:false},{text:'paver cost calculator',added:false},
    {text:'paver rental',added:false},{text:'backyard ideas',added:false},
    {text:'DIY landscaping',added:false},{text:'free estimate',added:false},
    {text:'patio ideas on a budget',added:false},{text:'how much does a patio cost',added:false},
    {text:'cheap outdoor living',added:false},{text:'DIY fire pit',added:false},
    {text:'paver installation salary',added:false},{text:'landscaper jobs',added:false},
    {text:'pavers for sale',added:false},{text:'patio stones home depot',added:false},
    {text:'concrete patio cost',added:false},{text:'patio design ideas',added:false},
    {text:'backyard makeover on a budget',added:false}
  ],
  checklistDone: [],
  pipelineNotes: '',
  kwFilter: 'all'
};

var campaigns = load('campaigns', null);
if (!campaigns || campaigns.length === 0) {
  campaigns = [DEFAULT_CAMPAIGN];
} else {
  var hasKCH = campaigns.some(function(c) { return c.id === 'kch-search-001'; });
  if (!hasKCH) campaigns.unshift(DEFAULT_CAMPAIGN);
}

var activeCampId = null;
var newCampType = 'search';

function getCamp(id) {
  for (var i = 0; i < campaigns.length; i++) {
    if (campaigns[i].id === id) return campaigns[i];
  }
  return null;
}

// ── NAVIGATION ───────────────────────────
function showHome() {
  document.getElementById('page-home').style.display = 'block';
  document.getElementById('page-campaign').style.display = 'none';
  document.getElementById('hdr-back').style.display = 'none';
  document.getElementById('hdr-campaign-name').style.display = 'none';
  activeCampId = null;
  renderHome();
}

function showCampaign(id) {
  var camp = getCamp(id);
  if (!camp) { alert('Campaign not found.'); return; }
  activeCampId = id;
  document.getElementById('page-home').style.display = 'none';
  document.getElementById('page-campaign').style.display = 'block';
  document.getElementById('hdr-back').style.display = 'flex';
  document.getElementById('hdr-campaign-name').style.display = 'block';
  document.getElementById('hdr-campaign-name').textContent = camp.name;
  renderCampaign(camp);
}

// ── HOME PAGE ────────────────────────────
function renderHome() {
  var grid = document.getElementById('campaign-grid');
  grid.innerHTML = '';

  for (var i = 0; i < campaigns.length; i++) {
    (function(camp) {
      var tc = typeColor(camp.type);
      var days = getDaysFor(camp.resetDate);

      var card = document.createElement('div');
      card.className = 'camp-card';
      card.addEventListener('click', function() { showCampaign(camp.id); });

      // Type badge
      var badge = document.createElement('div');
      badge.className = 'camp-card-type';
      badge.style.cssText = 'color:' + tc.color + ';background:' + tc.bg + ';display:inline-block;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:1px;';
      badge.textContent = typeLabel(camp.type);

      // Name
      var name = document.createElement('div');
      name.className = 'camp-card-name';
      name.style.marginTop = '6px';
      name.textContent = camp.name;

      // Meta row with budget input
      var meta = document.createElement('div');
      meta.className = 'camp-card-meta';
      meta.style.marginTop = '4px';
      meta.appendChild(document.createTextNode('Daily budget: $'));
      var budgetIn = document.createElement('input');
      budgetIn.type = 'number';
      budgetIn.value = camp.budget;
      budgetIn.min = 1;
      budgetIn.style.cssText = 'width:52px;padding:1px 4px;border:1px solid #ccc;border-radius:4px;font-size:11px;font-weight:700;font-family:monospace;';
      budgetIn.addEventListener('click', function(e) { e.stopPropagation(); });
      budgetIn.addEventListener('change', function(e) {
        e.stopPropagation();
        var n = parseFloat(budgetIn.value);
        if (!isNaN(n) && n > 0) { camp.budget = Math.round(n); save('campaigns', campaigns); }
      });
      meta.appendChild(budgetIn);
      meta.appendChild(document.createTextNode(' · Day ' + days + ' of recovery'));

      // Top section
      var top = document.createElement('div');
      top.className = 'camp-card-top';
      top.appendChild(badge);
      top.appendChild(name);
      top.appendChild(meta);

      // Stats
      var statA = camp.stats && camp.stats.spend ? '$' + camp.stats.spend : '—';
      var statB = camp.stats && camp.stats.leads ? camp.stats.leads : '—';
      var statC = camp.stats && camp.stats.cpl ? '$' + camp.stats.cpl : '—';
      var statsEl = document.createElement('div');
      statsEl.className = 'camp-card-stats';
      statsEl.innerHTML = '<div class="camp-stat"><div class="camp-stat-val">' + statA + '</div><div class="camp-stat-lbl">Spend</div></div>'
        + '<div class="camp-stat"><div class="camp-stat-val">' + statB + '</div><div class="camp-stat-lbl">Leads</div></div>'
        + '<div class="camp-stat"><div class="camp-stat-val">' + statC + '</div><div class="camp-stat-lbl">Cost/Lead</div></div>';

      // Footer
      var foot = document.createElement('div');
      foot.className = 'camp-card-foot';
      var sdot = document.createElement('span');
      sdot.className = 'camp-status-dot status-' + camp.status;
      var stxt = document.createElement('span');
      stxt.className = 'camp-status-text status-' + camp.status + '-text';
      stxt.textContent = statusLabel(camp.status);
      var openBtn = document.createElement('span');
      openBtn.className = 'camp-open-btn';
      openBtn.textContent = 'Open workspace →';
      var statusWrap = document.createElement('div');
      statusWrap.appendChild(sdot);
      statusWrap.appendChild(stxt);

      // Optimization score input
      var scoreWrap = document.createElement('div');
      scoreWrap.style.cssText = 'display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);';
      scoreWrap.appendChild(document.createTextNode('Opt. score:'));

      // Status light
      var scoreDot = document.createElement('span');
      var s = camp.optimizationScore;
      var dotColor = s === null || s === undefined ? '#d1d5db' : s >= 80 ? '#22c55e' : s >= 60 ? '#f59e0b' : '#ef4444';
      scoreDot.style.cssText = 'width:9px;height:9px;min-width:9px;border-radius:50%;background:' + dotColor + ';display:inline-block;';

      var scoreIn = document.createElement('input');
      scoreIn.type = 'number';
      scoreIn.min = 0;
      scoreIn.max = 100;
      scoreIn.step = 0.01;
      scoreIn.placeholder = '—';
      scoreIn.value = s !== null && s !== undefined ? s : '';
      scoreIn.style.cssText = 'width:58px;padding:1px 4px;border:1px solid #ccc;border-radius:4px;font-size:11px;font-weight:700;font-family:monospace;color:var(--stone);';
      scoreIn.addEventListener('click', function(e) { e.stopPropagation(); });
      scoreIn.addEventListener('change', function(e) {
        e.stopPropagation();
        var n = parseFloat(scoreIn.value);
        camp.optimizationScore = (!isNaN(n) && n >= 0 && n <= 100) ? n : null;
        save('campaigns', campaigns);
        var v = camp.optimizationScore;
        scoreDot.style.background = v === null ? '#d1d5db' : v >= 80 ? '#22c55e' : v >= 60 ? '#f59e0b' : '#ef4444';
      });

      scoreWrap.appendChild(scoreDot);
      scoreWrap.appendChild(scoreIn);
      scoreWrap.appendChild(document.createTextNode('%'));

      foot.appendChild(statusWrap);
      foot.appendChild(scoreWrap);
      foot.appendChild(openBtn);

      card.appendChild(top);
      card.appendChild(statsEl);
      card.appendChild(foot);
      grid.appendChild(card);
    })(campaigns[i]);
  }

  // Add campaign card
  var addCard = document.createElement('div');
  addCard.className = 'add-camp-card';
  addCard.innerHTML = '<div style="font-size:32px;color:#aaa;">+</div><div style="font-size:12px;font-weight:700;color:#aaa;">Add Campaign</div>';
  addCard.addEventListener('click', function() {
    document.getElementById('add-modal').classList.add('show');
  });
  grid.appendChild(addCard);
}

// ── CAMPAIGN PAGE ────────────────────────
function renderCampaign(camp) {
  var tabs = camp.type === 'search'
    ? ['input','performance','recovery','checklist','keywords','changes','season']
    : camp.type === 'pmax'
    ? ['input','performance','changes']
    : ['input','performance','changes','keywords'];

  var tabNames = {
    input: 'Daily Input', performance: 'Performance', recovery: 'Recovery', checklist: 'This Week',
    keywords: 'Keywords', changes: 'Change Log',
    season: 'Seasonality'
  };

  // Build tabs
  var tabBar = document.getElementById('camp-tabs');
  tabBar.innerHTML = '';
  var screenWrap = document.getElementById('camp-screens');
  screenWrap.innerHTML = '';

  for (var i = 0; i < tabs.length; i++) {
    (function(tabId, idx) {
      var btn = document.createElement('button');
      btn.className = 'tab' + (idx === 0 ? ' active' : '');
      if (tabId === 'recovery') {
        var dot = document.createElement('span');
        dot.className = 'tab-dot';
        btn.appendChild(dot);
      }
      btn.appendChild(document.createTextNode(tabNames[tabId]));
      btn.addEventListener('click', function() {
        document.querySelectorAll('#camp-tabs .tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('#camp-screens .screen').forEach(function(s) { s.classList.remove('active'); });
        btn.classList.add('active');
        var scr = document.getElementById('scr-' + tabId);
        if (scr) scr.classList.add('active');
      });
      tabBar.appendChild(btn);

      // Build screen
      var scr = document.createElement('div');
      scr.className = 'screen' + (idx === 0 ? ' active' : '');
      scr.id = 'scr-' + tabId;
      scr.innerHTML = buildScreen(tabId, camp);
      screenWrap.appendChild(scr);
    })(tabs[i], i);
  }

  // Init dynamic content
  renderKW(camp);
  renderCL(camp);
  renderNG(camp);
  wireKWButtons(camp);
  wireCLButtons(camp);
  initRecovery(camp);
  setTimeout(function(){ checkWarnings(camp); }, 100);
  initChecklist(camp);
  initInput(camp);
  renderPerfLog(camp);
}

// ── HELPERS ──────────────────────────────
function typeLabel(t) {
  return t === 'search' ? 'Search' : t === 'pmax' ? 'Performance Max' : 'Display';
}
function typeColor(t) {
  return t === 'search' ? {bg:'#eff4ff',color:'#1e3a8a'}
       : t === 'pmax'   ? {bg:'#fce7f3',color:'#9d174d'}
                        : {bg:'#f0faf5',color:'#155e3e'};
}
function statusLabel(s) {
  return s === 'learning' ? 'Learning Phase'
       : s === 'active'   ? 'Active'
       : s === 'paused'   ? 'Paused' : 'Unknown';
}
function getDaysFor(resetDate) {
  if (!resetDate) return 1;
  // Use Chicago midnight as the day boundary
  var now = new Date();
  var chicagoNow = new Date(now.toLocaleString('en-US', {timeZone: 'America/Chicago'}));
  var reset = new Date(resetDate + 'T00:00:00');
  var chicagoReset = new Date(reset.toLocaleString('en-US', {timeZone: 'America/Chicago'}));
  // Zero out time on both to compare calendar days
  chicagoNow.setHours(0,0,0,0);
  chicagoReset.setHours(0,0,0,0);
  var diff = Math.floor((chicagoNow - chicagoReset) / 86400000) + 1;
  return diff > 0 ? diff : 1;
}

// ── ADD CAMPAIGN ─────────────────────────
document.getElementById('type-search').addEventListener('click', function() { selectType('search'); });
document.getElementById('type-pmax').addEventListener('click', function() { selectType('pmax'); });
document.getElementById('type-display').addEventListener('click', function() { selectType('display'); });
document.getElementById('modal-cancel').addEventListener('click', function() {
  document.getElementById('add-modal').classList.remove('show');
});
document.getElementById('modal-create').addEventListener('click', function() {
  var name = document.getElementById('new-camp-name').value.trim();
  if (!name) { alert('Please enter a campaign name.'); return; }
  var camp = {
    id: 'camp-' + Date.now(),
    name: name,
    type: newCampType,
    budget: parseFloat(document.getElementById('new-camp-budget').value) || 50,
    status: document.getElementById('new-camp-status').value,
    notes: '',
    stats: {spend:0, leads:0, cpl:0},
    resetDate: new Date().toISOString().split('T')[0],
    phase: 0,
    logEntries: [], keywords: [], changes: [], negatives: [],
    checklistDone: [], pipelineNotes: '', kwFilter: 'all'
  };
  campaigns.push(camp);
  save('campaigns', campaigns);
  document.getElementById('add-modal').classList.remove('show');
  document.getElementById('new-camp-name').value = '';
  showCampaign(camp.id);
});
function selectType(type) {
  newCampType = type;
  ['search','pmax','display'].forEach(function(t) {
    document.getElementById('type-' + t).classList.remove('selected');
  });
  document.getElementById('type-' + type).classList.add('selected');
}

// ── HEADER BUTTONS ───────────────────────
document.getElementById('hdr-logo').addEventListener('click', showHome);
document.getElementById('hdr-back').addEventListener('click', showHome);
document.getElementById('btn-add-campaign').addEventListener('click', function() {
  document.getElementById('add-modal').classList.add('show');
});


// ── CONTENT FUNCTIONS ────────────────────
function buildScreen(id, camp){
  if(id==='input') return buildInput(camp);
  if(id==='performance') return buildPerformance(camp);
  if(id==='recovery') return buildRecovery(camp);
  if(id==='checklist') return buildChecklist(camp);
  if(id==='keywords') return buildKeywords(camp);
  if(id==='changes') return buildChanges(camp);
  if(id==='negatives') return buildNegatives(camp);
  if(id==='season') return buildSeason();
  if(id==='signals') return buildSignals();
  return '';
}

// ── RECOVERY ──────────────────────────────

// ── DAILY INPUT SCREEN ───────────────────
function buildInput(camp){
  return '<div class="alert alert-gold"><strong>Log today\'s numbers from Google Ads.</strong> Every entry builds your performance history. The more you log, the smarter the AI trend analysis gets.</div>'
  + '<div class="card"><div class="card-head"><h3>Today\'s Numbers</h3><p>Google Ads dashboard → your campaign → summary row at the top.</p></div><div class="card-body">'
  + '<div class="input-grid" style="margin-bottom:10px;">'
  + '<div class="mf"><label>Date</label><input type="date" id="di-date" style="font-size:13px;font-family:inherit;font-weight:500;"></div>'
  + '<div class="mf"><label>Impressions</label><input type="number" id="di-impr" placeholder="e.g. 42" min="0"></div>'
  + '<div class="mf"><label>Clicks</label><input type="number" id="di-clicks" placeholder="e.g. 8" min="0"></div>'
  + '<div class="mf"><label>Spend</label><div class="sym" data-s="$"><input type="number" id="di-spend" placeholder="e.g. 145" min="0" step="0.01"></div></div>'
  + '<div class="mf"><label>Leads (Calendly bookings)</label><input type="number" id="di-leads" placeholder="e.g. 1" min="0"></div>'
  + '<div class="mf"><label>Consultations showed up</label><input type="number" id="di-consults" placeholder="e.g. 1" min="0"></div>'
  + '</div>'
  + '<button class="btn btn-gold" onclick="saveDailyInput()">Save Entry</button>'
  + '<span class="saved" id="di-saved" style="margin-left:10px;">Saved</span>'
  + '</div></div>'
  + '<div id="di-log"></div>';
}

function initInput(camp){
  var el = document.getElementById("di-date");
  if(!el) return;
  var t = new Date();
  el.value = t.getFullYear() + "-" + String(t.getMonth()+1).padStart(2,"0") + "-" + String(t.getDate()).padStart(2,"0");
  renderDILog(camp);
}

function saveDailyInput(){
  var camp = getCamp(activeCampId);
  if(!camp) return;
  var date = document.getElementById("di-date").value;
  if(!date){ alert("Please select a date."); return; }
  var impr    = parseFloat(document.getElementById("di-impr").value)    || 0;
  var clicks  = parseFloat(document.getElementById("di-clicks").value)  || 0;
  var spend   = parseFloat(document.getElementById("di-spend").value)   || 0;
  var leads   = parseFloat(document.getElementById("di-leads").value)   || 0;
  var consults= parseFloat(document.getElementById("di-consults").value)|| 0;
  if(!camp.perfLog) camp.perfLog = [];
  // Remove existing entry for same date
  camp.perfLog = camp.perfLog.filter(function(e){ return e.date !== date; });
  camp.perfLog.push({ date:date, impr:impr, clicks:clicks, spend:spend, leads:leads, consults:consults });
  camp.perfLog.sort(function(a,b){ return a.date.localeCompare(b.date); });
  save("campaigns", campaigns);
  var m = document.getElementById("di-saved");
  if(m){ m.style.display="inline"; setTimeout(function(){ m.style.display="none"; }, 2000); }
  renderDILog(camp);
  renderPerfLog(camp);
  var c = getCamp(activeCampId); if(c) checkWarnings(c);
}

function removeDIEntry(date){
  var camp = getCamp(activeCampId);
  if(!camp || !camp.perfLog) return;
  camp.perfLog = camp.perfLog.filter(function(e){ return e.date !== date; });
  save("campaigns", campaigns);
  renderDILog(camp);
  renderPerfLog(camp);
}

function renderDILog(camp){
  var el = document.getElementById('di-log');
  if(!el) return;
  el.innerHTML = '';
  if(!camp.perfLog || camp.perfLog.length === 0) return;

  var card = document.createElement('div');
  card.className = 'card';
  card.style.marginTop = '12px';

  var head = document.createElement('div');
  head.className = 'card-head';
  head.innerHTML = '<h3>All Entries</h3><p>Most recent first. Click \u00d7 to remove.</p>';
  card.appendChild(head);

  var wrap = document.createElement('div');
  wrap.style.overflowX = 'auto';

  var table = document.createElement('table');
  table.style.cssText = 'width:100%;border-collapse:collapse;font-size:12px;';

  var cols = ['Date','Impr.','Clicks','Spend','Leads','Consults','CPL',''];
  var aligns = ['left','right','right','right','right','right','right','center'];
  var thead = document.createElement('thead');
  var hrow = document.createElement('tr');
  hrow.style.background = 'var(--surface)';
  cols.forEach(function(c, i){
    var th = document.createElement('th');
    th.textContent = c;
    th.style.cssText = 'text-align:' + aligns[i] + ';padding:8px 12px;border-bottom:2px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);';
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  camp.perfLog.slice().reverse().forEach(function(e){
    var cpl = e.leads > 0 ? '$' + Math.round(e.spend / e.leads) : '\u2014';
    var ds  = new Date(e.date + 'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    var vals = [ds, e.impr, e.clicks, '$'+e.spend.toFixed(0), e.leads, e.consults, cpl];
    var tr = document.createElement('tr');
    vals.forEach(function(v, i){
      var td = document.createElement('td');
      td.textContent = v;
      td.style.cssText = 'padding:9px 12px;text-align:' + aligns[i] + ';' + (i > 0 ? 'font-family:monospace;' : 'font-weight:600;');
      tr.appendChild(td);
    });
    var tdBtn = document.createElement('td');
    tdBtn.style.cssText = 'padding:9px 6px;text-align:center;';
    var btn = document.createElement('button');
    btn.textContent = '\u00d7';
    btn.style.cssText = 'font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;';
    btn.addEventListener('click', (function(date){ return function(){ removeDIEntry(date); }; })(e.date));
    tdBtn.appendChild(btn);
    tr.appendChild(tdBtn);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  card.appendChild(wrap);
  el.appendChild(card);
}

function buildPerformance(camp){
  var el = document.createElement('div');

  // Alert
  var alert = document.createElement('div');
  alert.className = 'alert alert-gold';
  alert.innerHTML = '<strong>Your numbers mean something different at $50K per job.</strong> A $300 cost per lead that would concern an e-commerce store is a grand slam for KCH. Everything here is calibrated to your business.';
  el.appendChild(alert);

  // Summary tiles (filled by renderPerfLog)
  var tiles = document.createElement('div');
  tiles.id = 'perf-summary-tiles';
  el.appendChild(tiles);

  // Weekly table (filled by renderPerfLog)
  var weekly = document.createElement('div');
  weekly.id = 'perf-weekly-table';
  el.appendChild(weekly);

  // AI Trend Analysis
  var aiCard = document.createElement('div');
  aiCard.className = 'card';
  aiCard.style.marginTop = '12px';
  var aiHead = document.createElement('div');
  aiHead.className = 'card-head';
  aiHead.innerHTML = '<h3>AI Trend Analysis</h3><p>Reads your full performance history and tells you what the trends mean for KCH in plain English.</p>';
  var aiBody = document.createElement('div');
  aiBody.className = 'card-body';
  var aiBtn = document.createElement('button');
  aiBtn.id = 'perf-ai-btn';
  aiBtn.className = 'btn btn-gold';
  aiBtn.textContent = 'Analyze My Campaign Trend';
  aiBtn.style.cssText = 'width:100%;justify-content:center;font-size:13px;padding:12px;';
  aiBtn.addEventListener('click', getPerfAI);
  var aiLoading = document.createElement('div');
  aiLoading.id = 'perf-ai-loading';
  aiLoading.textContent = 'Analyzing your performance history...';
  aiLoading.style.cssText = 'display:none;text-align:center;padding:20px;color:var(--muted);font-size:13px;';
  var aiOutput = document.createElement('div');
  aiOutput.id = 'perf-ai-output';
  aiOutput.style.display = 'none';
  aiOutput.style.marginTop = '14px';
  aiBody.appendChild(aiBtn);
  aiBody.appendChild(aiLoading);
  aiBody.appendChild(aiOutput);

function renderPerfLog(camp){
  var tilesEl = document.getElementById('perf-summary-tiles');
  var tableEl = document.getElementById('perf-weekly-table');
  if(!tilesEl || !tableEl) return;

  if(!camp.perfLog || camp.perfLog.length === 0){
    tilesEl.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;background:var(--white);border-radius:10px;border:1px solid var(--border);margin-bottom:12px;">No data yet. Log daily entries in the Daily Input tab.</div>';
    tableEl.innerHTML = '';
    return;
  }

  // Totals
  var totalSpend=0, totalLeads=0, totalImpr=0, totalClicks=0, totalConsults=0;
  camp.perfLog.forEach(function(e){
    totalSpend+=e.spend; totalLeads+=e.leads; totalImpr+=e.impr;
    totalClicks+=e.clicks; totalConsults+=e.consults;
  });
  var avgCPL = totalLeads > 0 ? Math.round(totalSpend/totalLeads) : null;
  var ctr    = totalImpr  > 0 ? (totalClicks/totalImpr*100).toFixed(1) : null;
  var cplCls = avgCPL===null ? 'neu' : avgCPL<150 ? 'good' : avgCPL<500 ? 'warn' : 'bad';

  tilesEl.innerHTML = '<div class="tile-grid" style="margin-bottom:12px;">'
    + '<div class="tile neu"><div class="tile-lbl">Total Spend</div><div class="tile-val">$'+totalSpend.toFixed(0)+'</div><div class="tile-sub">'+camp.perfLog.length+' days logged</div></div>'
    + '<div class="tile neu"><div class="tile-lbl">Total Leads</div><div class="tile-val">'+totalLeads+'</div><div class="tile-sub">'+totalConsults+' consultations</div></div>'
    + '<div class="tile '+cplCls+'"><div class="tile-lbl">Avg Cost Per Lead</div><div class="tile-val">'+(avgCPL!==null?'$'+avgCPL:'\u2014')+'</div><div class="tile-sub">Max viable: $3,000</div></div>'
    + '<div class="tile neu"><div class="tile-lbl">Avg CTR</div><div class="tile-val">'+(ctr!==null?ctr+'%':'\u2014')+'</div><div class="tile-sub">Target: above 2%</div></div>'
    + '</div>';

  // Group by week (Monday start)
  function weekKey(dateStr){
    var d = new Date(dateStr+'T12:00:00');
    var day = d.getDay();
    var monday = new Date(d);
    monday.setDate(d.getDate() - (day===0?6:day-1));
    return monday.toISOString().split('T')[0];
  }
  var weeks = {}, weekOrder = [];
  camp.perfLog.forEach(function(e){
    var wk = weekKey(e.date);
    if(!weeks[wk]){ weeks[wk]={spend:0,leads:0,impr:0,clicks:0,consults:0,days:0}; weekOrder.push(wk); }
    weeks[wk].spend+=e.spend; weeks[wk].leads+=e.leads; weeks[wk].impr+=e.impr;
    weeks[wk].clicks+=e.clicks; weeks[wk].consults+=e.consults; weeks[wk].days++;
  });
  weekOrder.sort().reverse();

  var wrap = document.createElement('div');
  wrap.className = 'card';
  wrap.style.marginBottom = '12px';

  var head = document.createElement('div');
  head.className = 'card-head';
  head.innerHTML = '<h3>Weekly Breakdown</h3><p>Each row is one calendar week. Most recent first.</p>';
  wrap.appendChild(head);

  var scrollWrap = document.createElement('div');
  scrollWrap.style.overflowX = 'auto';

  var table = document.createElement('table');
  table.style.cssText = 'width:100%;border-collapse:collapse;font-size:12px;';

  var cols   = ['Week','Days','Impr.','Clicks','Spend','Leads','Consults','CPL'];
  var aligns = ['left','center','right','right','right','right','right','right'];
  var thead = document.createElement('thead');
  var hrow  = document.createElement('tr');
  hrow.style.background = 'var(--surface)';
  cols.forEach(function(c,i){
    var th = document.createElement('th');
    th.textContent = c;
    th.style.cssText = 'text-align:'+aligns[i]+';padding:8px 12px;border-bottom:2px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);';
    hrow.appendChild(th);
  });
  thead.appendChild(hrow);
  table.appendChild(thead);

  var tbody = document.createElement('tbody');
  weekOrder.forEach(function(wk){
    var w = weeks[wk];
    var wCPL  = w.leads > 0 ? '$'+Math.round(w.spend/w.leads) : '\u2014';
    var wDate = new Date(wk+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    var vals  = ['Week of '+wDate, w.days+'d', w.impr.toLocaleString(), w.clicks, '$'+w.spend.toFixed(0), w.leads, w.consults, wCPL];
    var tr = document.createElement('tr');
    vals.forEach(function(v,i){
      var td = document.createElement('td');
      td.textContent = v;
      td.style.cssText = 'padding:9px 12px;text-align:'+aligns[i]+';'+(i===0?'font-weight:700;':'font-family:monospace;');
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  scrollWrap.appendChild(table);
  wrap.appendChild(scrollWrap);
  tableEl.innerHTML = '';
  tableEl.appendChild(wrap);
}

    + "Write directly to the business owner. Be honest and specific. No generic advice. Keep it under 300 words.";

  try {
    var resp = await fetch("https://kch-ai-proxy.charlie-2bb.workers.dev/", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:800, messages:[{role:"user",content:prompt}]})
    });

    var text = data.content && data.content[0] ? data.content[0].text : "No response.";
    var formatted = text.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n\n/g,"<br><br>").replace(/\n/g,"<br>");
    var outDiv = document.createElement("div");

    regenRow.style.cssText = "margin-top:10px;text-align:right;";
    var regenBtn = document.createElement("button");
    regenBtn.className = "btn btn-ghost";

    regenBtn.addEventListener("click", function(){ btn.style.display="block"; output.style.display="none"; });

// ── CHECKLIST ─────────────────────────────

  +'<div class="slbl">Priority — Do These First</div>'
  +'<div class="card"><ul class="cl">'
  +[
    ['Pull the Search Terms Report and remove wasteful keywords','Keywords → Search Terms. Look for anything that isn\'t a homeowner ready to spend.','Block immediately: "DIY patio," "paver cost calculator," "cheap pavers," "how to build," "paver rental," "backyard ideas."','Priority'],
    ['Count qualified Calendly bookings — that\'s the only metric that matters','Clicks and impressions are noise. A Calendly booking with one of your designers is the only number that moves your business forward.','At your price point, 1–2 genuine bookings per week is a strong pipeline. One closed job equals $50K.','Priority'],
    ['Check your cost per lead against the $3,000 threshold','Enter your numbers in Health Check. At a $50K average and 30% close rate, you can justify spending up to $3,000 per lead and still profit.','Under $500 CPL is exceptional. Under $1,000 is very profitable.','Priority'],
  ].map(function(t){return '<li onclick="togCL(this)"><div class="chk"></div><div class="ci"><div class="ct">'+t[0]+'</div><div class="cd">'+t[1]+'</div><div class="cnote">'+t[2]+'</div></div><span class="ctag tag-priority">'+t[3]+'</span></li>';}).join('')
  +'</ul></div>'
  +'<div class="slbl">Strategic — Weekly Review</div>'
  +'<div class="card"><ul class="cl">'

    ['Confirm ads are running when your designers can respond','Reports → Ad Schedule. A buyer who books and doesn\'t receive follow-up within a few hours will move on.','Make sure someone follows up personally before end of business day. The gap between booking and first human contact is where deals are lost.','Strategic'],
    ['Verify you\'re targeting the right KC neighborhoods','Reports → Geographic. You want clicks from Leawood, Overland Park, Prairie Village, Lenexa — not Lawrence or rural Missouri.','Every click from outside your real buyer profile is wasted spend.','Strategic'],
  ].map(function(t){return '<li onclick="togCL(this)"><div class="chk"></div><div class="ci"><div class="ct">'+t[0]+'</div><div class="cd">'+t[1]+'</div><div class="cnote">'+t[2]+'</div></div><span class="ctag tag-strategic">'+t[3]+'</span></li>';}).join('')

    ['Test a headline that includes a project price range','Price anchors repel tire-kickers and attract buyers who already understand what premium hardscape costs.','Try: "Custom Patios Starting at $25K." You want two serious leads — not twenty bad ones.','Growth'],
    ['Log your full pipeline — leads, consults, proposals, closes','Track the complete funnel, not just ad metrics. This is the data that tells you what your ads are actually worth.','Even one closed job per month from a $1,500 ad spend is a 33x return.','Growth'],
  ].map(function(t){return '<li onclick="togCL(this)"><div class="chk"></div><div class="ci"><div class="ct">'+t[0]+'</div><div class="cd">'+t[1]+'</div><div class="cnote">'+t[2]+'</div></div><span class="ctag tag-growth">'+t[3]+'</span></li>';}).join('')

// ── SEASON ────────────────────────────────
function buildSeason(){
  var mos=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var seas=[{s:'cold',l:'Off',h:10},{s:'cold',l:'Off',h:10},{s:'warm',l:'Ramp',h:55},{s:'hot',l:'Peak',h:100},{s:'hot',l:'Peak',h:100},{s:'hot',l:'Peak',h:95},{s:'hot',l:'Peak',h:90},{s:'hot',l:'Peak',h:85},{s:'warm',l:'Taper',h:60},{s:'warm',l:'Wind Down',h:35},{s:'cold',l:'Low',h:15},{s:'cold',l:'Off',h:10}];
  var curMo=new Date().getMonth();
  var moStrats=['January: Pause or reduce to minimum budget. Ground is frozen. Save for March.','February: Start preparing. Build and test spring campaigns before the season begins.','March: Ramp up aggressively — before your competitors. This is your head-start window.','April: Full budget. Peak season is here. Every booking now could be a summer install.','May: Full budget. Your highest-intent booking month. Maximize visibility evenings and weekends.','June: Full budget. Start booking fall projects. Don\'t let installs distract from lead pipeline.','July: Full budget. Homeowners planning fall spaces are searching now. Book September and October.','August: Full budget — last major push. Add urgency messaging: "Book Now for Fall Installation."','September: Moderate budget. Final push to fill fall calendar. Urgency messaging performs well.','October: Reduce significantly. Maintain minimal presence for early planners.','November: Low budget or pause. If running anything, shift to "Plan Your Spring Project Now."','December: Pause main campaign. Save budget for March.'];
  var moFull=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var grid=mos.map(function(m,i){var s=seas[i];var cls=s.s==='hot'?'mo-hot':s.s==='warm'?'mo-warm':'mo-cold';var bc=s.s==='hot'?'#f59e0b':s.s==='warm'?'#34d399':'#d1d5db';var hi=i===curMo?'box-shadow:0 0 0 2px var(--gold);':'';return'<div class="mo '+cls+'" style="'+hi+'"><div class="mo-name">'+m+'</div><div class="mo-bar" style="background:'+bc+';width:'+s.h+'%;"></div><div class="mo-status">'+s.l+'</div></div>';}).join('');
  return '<div class="alert alert-gold"><strong>Hardscape is one of the most seasonal businesses in Google Ads.</strong> The businesses that win in KC hardscape go heavy during peak and dark in winter.</div>'
  +'<div class="card"><div class="card-head"><h3>Kansas City Hardscape Season</h3><p>When to spend, when to pull back. The outlined month is today.</p></div><div class="card-body"><div class="season-grid">'+grid+'</div></div></div>'
  +'<div class="card"><div class="card-head"><h3>Monthly Strategy</h3></div><div style="overflow-x:auto;"><table class="bm"><thead><tr><th>Period</th><th style="text-align:left;">Move</th><th style="text-align:left;">Why</th></tr></thead><tbody>'
  +'<tr><td><strong>Jan–Feb</strong></td><td style="color:#d97706;font-weight:700;text-align:left;">Pause or minimum</td><td style="font-size:11px;color:var(--muted);text-align:left;">KC ground frozen. Save budget for March.</td></tr>'
  +'<tr><td><strong>March</strong></td><td style="color:#2563eb;font-weight:700;text-align:left;">Ramp up early</td><td style="font-size:11px;color:var(--muted);text-align:left;">Get visible before competitors wake up.</td></tr>'
  +'<tr><td><strong>Apr–Jun</strong></td><td style="color:#16a34a;font-weight:700;text-align:left;">Full budget</td><td style="font-size:11px;color:var(--muted);text-align:left;">Peak season. Highest intent. Spend aggressively.</td></tr>'
  +'<tr><td><strong>Jul–Aug</strong></td><td style="color:#16a34a;font-weight:700;text-align:left;">Full budget</td><td style="font-size:11px;color:var(--muted);text-align:left;">Book fall projects. Don\'t let installs kill pipeline.</td></tr>'
  +'<tr><td><strong>Sep</strong></td><td style="color:#2563eb;font-weight:700;text-align:left;">Book fall calendar</td><td style="font-size:11px;color:var(--muted);text-align:left;">Last real push. Urgency messaging works.</td></tr>'
  +'<tr><td><strong>Oct–Dec</strong></td><td style="color:#d97706;font-weight:700;text-align:left;">Reduce significantly</td><td style="font-size:11px;color:var(--muted);text-align:left;">Demand drops sharply. Pause in December.</td></tr>'
  +'</tbody></table></div></div>'
  +'<div class="card"><div class="card-head"><h3>'+moFull[curMo]+' Strategy</h3></div><div class="card-body"><p style="font-size:13px;line-height:1.85;color:var(--stone);">'+moStrats[curMo]+'</p></div></div>';
}

// ── SIGNALS ───────────────────────────────

  return '<div class="alert alert-neutral"><strong>These warning signs are specific to low-volume, high-ticket local service businesses.</strong> Generic Google Ads advice is calibrated for e-commerce. Kansas City Hardscapes operates completely differently.</div>'
  +'<div class="slbl">Signals Your Ads Are Working Against You</div>'

// RECOVERY LOGIC
// ══════════════════════════════════════════
var RESET_DATE = new Date('2026-03-02');
var phaseNames = ['Reset','Warming','Learning','Stabilizing','Recovered'];
var phaseSubs = [
  'Reset on March 2 · Switched to Maximize Conversions · Target CPA removed',
  'Impressions beginning to return — do not make any changes',
  'Algorithm actively collecting data — patience required',
  'Performance stabilizing — monitor closely before any changes',
  'Campaign fully recovered — consider reintroducing Target CPA'
];

function initRecovery(camp){
  var days = getDaysFor(camp.resetDate);
  var el = document.getElementById('day-count');
  if(el) el.textContent = days;
  updatePhaseDots(camp.phase);
  updatePhaseHeader(camp);
  setDefaultLogDate();
  renderLogTable(camp);
  renderLogTotals(camp);
}

function getDaysSinceReset(camp){
  var rd = camp ? camp.resetDate : '2026-03-02';
  var now = new Date();
  var chicagoNow = new Date(now.toLocaleString('en-US', {timeZone: 'America/Chicago'}));
  var reset = new Date(rd + 'T00:00:00');
  var chicagoReset = new Date(reset.toLocaleString('en-US', {timeZone: 'America/Chicago'}));
  chicagoNow.setHours(0,0,0,0);
  chicagoReset.setHours(0,0,0,0);
  var diff = Math.floor((chicagoNow - chicagoReset) / 86400000) + 1;
  return diff > 0 ? diff : 1;
}

function updatePhaseHeader(camp){
  var days = getDaysSinceReset(camp);
  var phase = camp ? camp.phase : 0;
  var dc = document.getElementById('day-count');
  if(dc) dc.textContent = days;
  var pn = document.getElementById('phase-name-main');
  if(pn) pn.textContent = phaseNames[phase];
  var ps = document.getElementById('phase-status-sub');
  if(ps) ps.textContent = phaseSubs[phase];
  var dLeft = Math.max(0, 14 - days);
  var badge = document.getElementById('phase-badge');
  var dlv = document.getElementById('days-left-val');
  if(dlv) dlv.textContent = dLeft === 0 ? 'Done' : dLeft;
  if(badge){
    if(dLeft===0){badge.style.background='#f0faf5';badge.style.borderColor='#6ee7b7';badge.style.color='#155e3e';}
    else if(dLeft<=4){badge.style.background='#fffbeb';badge.style.borderColor='#fcd34d';badge.style.color='#78350f';}
    else{badge.style.background='#fee2e2';badge.style.borderColor='#fca5a5';badge.style.color='#9b1c1c';}
  }
  var pct = Math.min(100,(phase/4)*100);
  var pl = document.getElementById('phase-progress-line');
  if(pl) pl.style.width = pct+'%';
  var hp = document.getElementById('hdr-campaign-name');
  if(hp && camp){
    hp.textContent = camp.name + '  ·  Day '+days+(phase===4?' — Recovered':' — '+phaseNames[phase]);
  }
}

function updatePhaseDots(phase){
  for(var i=0;i<5;i++){
    var d=document.getElementById('pd'+i),l=document.getElementById('pl'+i);
    if(!d)continue;
    d.className='pdot';
    if(i<phase){d.classList.add('done');d.textContent='✓';}
    else{d.textContent=(i+1);if(i===phase){d.classList.add('active');if(l)l.classList.add('active');}else{if(l)l.classList.remove('active');}}
  }
}

function advPhase(){
  var camp=getCamp(activeCampId);
  if(!camp)return;
  if(camp.phase<4){camp.phase++;save('campaigns',campaigns);updatePhaseDots(camp.phase);updatePhaseHeader(camp);}
}
function resetPhase(){
  if(!confirm('Reset phase back to the beginning?'))return;
  var camp=getCamp(activeCampId);
  if(!camp)return;
  camp.phase=0;save('campaigns',campaigns);updatePhaseDots(0);updatePhaseHeader(camp);
}
function togR(el){el.classList.toggle('done');}

function setDefaultLogDate(){
  var el=document.getElementById('log-date');
  if(!el)return;
  var t=new Date();
  el.value=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
}

function addLogEntry(){
  var camp=getCamp(activeCampId); if(!camp)return;
  var dateVal=document.getElementById('log-date').value;
  if(!dateVal){alert('Please enter a date.');return;}
  var impr=parseFloat(document.getElementById('log-impr').value)||0;
  var clicks=parseFloat(document.getElementById('log-clicks').value)||0;
  var spend=parseFloat(document.getElementById('log-spend').value)||0;
  var conv=parseFloat(document.getElementById('log-conv').value)||0;
  var dayNum=Math.floor((new Date(dateVal)-new Date(camp.resetDate))/864e5)+1;
  var sig,sigColor;
  if(!impr&&!spend){sig='No data';sigColor='#9ca3af';}
  else if(impr>=40&&conv>0){sig='Recovering';sigColor='#155e3e';}
  else if(impr>=20){sig='Warming';sigColor='#d97706';}
  else if(impr>0){sig='Still low';sigColor='#991b1b';}
  else{sig='No impressions';sigColor='#991b1b';}
  camp.logEntries.push({date:dateVal,day:dayNum,impr:impr,clicks:clicks,spend:spend,conv:conv,sig:sig,sigColor:sigColor});
  camp.logEntries.sort(function(a,b){return a.date.localeCompare(b.date);});
  save('campaigns',campaigns);
  ['log-impr','log-clicks','log-spend','log-conv'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
  var m=document.getElementById('log-msg');if(m){m.style.display='block';setTimeout(function(){m.style.display='none';},2000);}
  renderLogTable(camp);renderLogTotals(camp);
}

function removeLogEntry(idx){
  var camp=getCamp(activeCampId);if(!camp)return;
  camp.logEntries.splice(idx,1);save('campaigns',campaigns);
  renderLogTable(camp);renderLogTotals(camp);
}

function renderLogTable(camp){
  var tbody=document.getElementById('log-tbody');if(!tbody)return;
  if(!camp.logEntries||camp.logEntries.length===0){
    tbody.innerHTML='<tr><td colspan="8" style="padding:20px 10px;text-align:center;color:var(--muted);font-size:12px;font-style:italic;">No entries yet.</td></tr>';return;
  }
  tbody.innerHTML=camp.logEntries.map(function(e,i){
    var df=new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    var bg=i%2===1?'background:#faf9f7;':'';
    return'<tr style="'+bg+'"><td style="padding:9px 10px;font-weight:600;white-space:nowrap;">'+df+'</td>'
      +'<td style="padding:9px 10px;color:var(--muted);white-space:nowrap;">Day '+e.day+'</td>'
      +'<td style="padding:9px 10px;text-align:right;font-family:monospace;font-weight:700;">'+e.impr+'</td>'
      +'<td style="padding:9px 10px;text-align:right;font-family:monospace;font-weight:700;">'+e.clicks+'</td>'
      +'<td style="padding:9px 10px;text-align:right;font-family:monospace;font-weight:700;">$'+e.spend.toFixed(0)+'</td>'
      +'<td style="padding:9px 10px;text-align:right;font-family:monospace;font-weight:700;">'+e.conv+'</td>'
      +'<td style="padding:9px 10px;text-align:center;"><span style="font-size:10px;font-weight:700;color:'+e.sigColor+';">'+e.sig+'</span></td>'
      +'<td style="padding:9px 6px;text-align:center;"><button onclick="removeLogEntry('+i+')" style="font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 6px;">&#10005;</button></td></tr>';
  }).join('');
}

function renderLogTotals(camp){
  var el=document.getElementById('log-totals');if(!el)return;
  if(!camp.logEntries||camp.logEntries.length===0){el.style.display='none';return;}
  el.style.display='block';
  var ts=camp.logEntries.reduce(function(s,e){return s+e.spend;},0);
  var tc=camp.logEntries.reduce(function(s,e){return s+e.conv;},0);
  var ti=camp.logEntries.reduce(function(s,e){return s+e.impr;},0);
  var ai=Math.round(ti/camp.logEntries.length);
  var cpl=tc>0?(ts/tc):null;
  var tots=document.getElementById('tot-spend');if(tots)tots.textContent='$'+ts.toFixed(0);
  var totc=document.getElementById('tot-conv');if(totc)totc.textContent=tc;
  var toti=document.getElementById('tot-impr');if(toti)toti.textContent=ai;
  var totcpl=document.getElementById('tot-cpl');if(totcpl)totcpl.textContent=cpl?'$'+Math.round(cpl):'—';
  var ct=document.getElementById('tot-conv-tile');if(ct)ct.className='tile '+(tc>=5?'good':tc>=2?'warn':'neu');
  var it=document.getElementById('tot-impr-tile');if(it)it.className='tile '+(ai>=30?'good':ai>=10?'warn':'bad');
}

var kwStatusColors={'Active':{bg:'#f0faf5',border:'#6ee7b7',text:'#155e3e'},'Testing':{bg:'#eff4ff',border:'#bfdbfe',text:'#1e3a8a'},'Paused':{bg:'#fffbeb',border:'#fcd34d',text:'#78350f'},'Removed':{bg:'#fff5f5',border:'#fca5a5',text:'#991b1b'}};
var kwMatchColors={'Exact':{bg:'#f0faf5',color:'#155e3e'},'Phrase':{bg:'#eff4ff',color:'#1e3a8a'},'Broad':{bg:'#fffbeb',color:'#78350f'}};


function wireKWButtons(camp){
  // Sub-tab switching
  var kwSubBtn  = document.getElementById('kw-subtab-btn');
  var negSubBtn = document.getElementById('neg-subtab-btn');
  var baseStyle   = 'padding:10px 20px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;color:var(--muted);';
  var activeStyle = 'color:var(--stone);border-bottom-color:var(--gold);';
  if(kwSubBtn && negSubBtn){
    var kwPane  = kwSubBtn.parentElement.nextElementSibling;
    var negPane = negSubBtn.parentElement.nextElementSibling
                    ? negSubBtn.parentElement.nextElementSibling.nextElementSibling : null;
    // Better: find by scanning siblings
    var screens = document.querySelectorAll('#scr-keywords > div');
    // kwPane is first div after subBar, negPane is second
    var subBar = document.getElementById('kw-subtab-btn').parentElement;
    var panes  = [];
    var sib = subBar.nextElementSibling;
    while(sib){ panes.push(sib); sib = sib.nextElementSibling; }
    var kwP  = panes[0];
    var negP = panes[1];
    if(kwP && negP){
      kwSubBtn.addEventListener('click', function(){
        kwP.style.display  = 'block';
        negP.style.display = 'none';
        kwSubBtn.style.cssText  = baseStyle + activeStyle;
        negSubBtn.style.cssText = baseStyle;
      });
      negSubBtn.addEventListener('click', function(){
        kwP.style.display  = 'none';
        negP.style.display = 'block';
        negSubBtn.style.cssText = baseStyle + activeStyle;
        kwSubBtn.style.cssText  = baseStyle;
      });
    }
  }

  // Add keyword button
  var addBtn = document.getElementById('kw-add-btn');
  if(addBtn) addBtn.addEventListener('click', addKW);

  // Filter buttons
  var filters = document.querySelectorAll('#kw-filters .kw-filter-btn');
  filters.forEach(function(btn){
    btn.addEventListener('click', function(){
      filterKW(btn.getAttribute('data-filter'), btn);
    });
  });

  // AI keyword button
  var aiBtn = document.getElementById('kw-ai-btn');
  if(aiBtn) aiBtn.addEventListener('click', getKWRec);

  // Negatives buttons
  var negAdd  = document.getElementById('neg-add-btn');
  var negCopy = document.getElementById('neg-copy-btn');
  var negAI   = document.getElementById('neg-ai-btn');
  var negIn   = document.getElementById('neg-input');
  if(negAdd)  negAdd.addEventListener('click', addNeg);
  if(negCopy) negCopy.addEventListener('click', copyNegs);
  if(negAI)   negAI.addEventListener('click', getNegRec);
  if(negIn)   negIn.addEventListener('keydown', function(e){ if(e.key==='Enter') addNeg(); });
}

function addKW(){
  var camp=getCamp(activeCampId);if(!camp)return;
  var text=document.getElementById('kw-text').value.trim();
  if(!text){alert('Please enter a keyword.');return;}
  if(!camp.keywords)camp.keywords=[];
  camp.keywords.push({id:Date.now(),text:text,match:document.getElementById('kw-match').value,status:document.getElementById('kw-status').value,notes:document.getElementById('kw-notes').value.trim(),added:new Date().toISOString().split('T')[0]});
  save('campaigns',campaigns);
  document.getElementById('kw-text').value='';document.getElementById('kw-notes').value='';
  var m=document.getElementById('kw-saved');if(m){m.style.display='inline';setTimeout(function(){m.style.display='none';},2000);}
  renderKW(camp);
}
function updateKWStatus(id,val){
  var camp=getCamp(activeCampId);if(!camp)return;
  var kw=camp.keywords.find(function(k){return k.id===id;});
  if(kw){kw.status=val;save('campaigns',campaigns);renderKW(camp);}
}
function updateKWNotes(id,val){
  var camp=getCamp(activeCampId);if(!camp)return;
  var kw=camp.keywords.find(function(k){return k.id===id;});
  if(kw){kw.notes=val;save('campaigns',campaigns);}
}
function removeKW(id){
  var camp=getCamp(activeCampId);if(!camp)return;
  camp.keywords=camp.keywords.filter(function(k){return k.id!==id;});
  save('campaigns',campaigns);renderKW(camp);
}
function filterKW(f,btn){
  var camp=getCamp(activeCampId);if(camp){camp.kwFilter=f;save('campaigns',campaigns);}
  document.querySelectorAll('.kw-filter-btn').forEach(function(b){b.classList.remove('kw-f-active');});
  btn.classList.add('kw-f-active');
  renderKW(camp);
}
function renderKW(camp){
  var list=document.getElementById('kw-list');if(!list)return;
  if(!camp||!camp.keywords||camp.keywords.length===0){
    list.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px;background:var(--white);border-radius:10px;border:1px solid var(--border);">No keywords yet. Add your first keyword above.</div>';return;
  }
  var filter=camp.kwFilter||'all';
  var filtered=filter==='all'?camp.keywords:camp.keywords.filter(function(k){return k.status===filter;});
  if(filtered.length===0){
    list.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;background:var(--white);border-radius:10px;border:1px solid var(--border);">No keywords with status "'+filter+'".</div>';return;
  }
  list.innerHTML=filtered.map(function(kw){
    var sc=kwStatusColors[kw.status]||{bg:'#f5f3ef',border:'var(--border)',text:'var(--muted)'};
    var mc=kwMatchColors[kw.match]||{bg:'#f5f3ef',color:'var(--muted)'};
    var opts=['Active','Testing','Paused','Removed'].map(function(s){return'<option value="'+s+'"'+(kw.status===s?' selected':'')+'>'+s+'</option>';}).join('');
    return'<div style="background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;">'
      +'<div style="flex:1;min-width:0;">'
      +'<div style="font-size:14px;font-weight:700;color:var(--stone);margin-bottom:6px;">'+kw.text+'</div>'
      +'<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;">'
      +'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:'+mc.bg+';color:'+mc.color+';">'+kw.match+' Match</span>'
      +'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:'+sc.bg+';color:'+sc.text+';border:1px solid '+sc.border+';">'+kw.status+'</span>'
      +'<span style="font-size:10px;color:var(--muted);">Added '+kw.added+'</span>'
      +'</div>'
      +'<input type="text" value="'+kw.notes.replace(/"/g,'&quot;')+'" placeholder="Add a performance note..." onchange="updateKWNotes('+kw.id+',this.value)" style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;color:var(--muted);background:var(--surface);outline:none;">'
      +'</div>'
      +'<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">'
      +'<select onchange="updateKWStatus('+kw.id+',this.value)" style="padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:700;color:var(--stone);background:var(--surface);outline:none;cursor:pointer;">'+opts+'</select>'
      +'<button onclick="removeKW('+kw.id+')" style="font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;">Remove</button>'
      +'</div></div></div>';
  }).join('');
}
