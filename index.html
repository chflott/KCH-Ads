// ══════════════════════════════════════════
var RESET_DATE = new Date('2026-03-02');
var phaseNames = ['Reset','Warming','Learning','Stabilizing','Recovered'];
var phaseSubs = [
  'Reset on March 2 · Switched to Maximize Conversions · Target CPA removed',
  'Impressions beginning to return — do not make any changes',
  'Algorithm actively collecting data — patience required',
  'Performance stabilizing — monitor closely before any changes',
  'Campaign fully recovered — consider reintroducing Target CPA'
];

function initRecovery(camp){
  var days = getDaysFor(camp.resetDate);
  var el = document.getElementById('day-count');
  if(el) el.textContent = days;
  updatePhaseDots(camp.phase);
  updatePhaseHeader(camp);
  setDefaultLogDate();
  renderLogTable(camp);
  renderLogTotals(camp);
}

function getDaysSinceReset(camp){
  var rd = camp ? camp.resetDate : '2026-03-02';
  var now = new Date();
  var chicagoNow = new Date(now.toLocaleString('en-US', {timeZone: 'America/Chicago'}));
  var reset = new Date(rd + 'T00:00:00');
  var chicagoReset = new Date(reset.toLocaleString('en-US', {timeZone: 'America/Chicago'}));
  chicagoNow.setHours(0,0,0,0);
  chicagoReset.setHours(0,0,0,0);
  var diff = Math.floor((chicagoNow - chicagoReset) / 86400000) + 1;
  return diff > 0 ? diff : 1;
}

function updatePhaseHeader(camp){
  var days = getDaysSinceReset(camp);
  var phase = camp ? camp.phase : 0;
  var dc = document.getElementById('day-count');
  if(dc) dc.textContent = days;
  var pn = document.getElementById('phase-name-main');
  if(pn) pn.textContent = phaseNames[phase];
  var ps = document.getElementById('phase-status-sub');
  if(ps) ps.textContent = phaseSubs[phase];
  var dLeft = Math.max(0, 14 - days);
  var badge = document.getElementById('phase-badge');
  var dlv = document.getElementById('days-left-val');
  if(dlv) dlv.textContent = dLeft === 0 ? 'Done' : dLeft;
  if(badge){
    if(dLeft===0){badge.style.background='#f0faf5';badge.style.borderColor='#6ee7b7';badge.style.color='#155e3e';}
    else if(dLeft<=4){badge.style.background='#fffbeb';badge.style.borderColor='#fcd34d';badge.style.color='#78350f';}
    else{badge.style.background='#fee2e2';badge.style.borderColor='#fca5a5';badge.style.color='#9b1c1c';}
  }
  var pct = Math.min(100,(phase/4)*100);
  var pl = document.getElementById('phase-progress-line');
  if(pl) pl.style.width = pct+'%';
  var hp = document.getElementById('hdr-campaign-name');
  if(hp && camp){
    hp.textContent = camp.name + '  ·  Day '+days+(phase===4?' — Recovered':' — '+phaseNames[phase]);
  }
}

function updatePhaseDots(phase){
  for(var i=0;i<5;i++){
    var d=document.getElementById('pd'+i),l=document.getElementById('pl'+i);
    if(!d)continue;
    d.className='pdot';
    if(i<phase){d.classList.add('done');d.textContent='✓';}
    else{d.textContent=(i+1);if(i===phase){d.classList.add('active');if(l)l.classList.add('active');}else{if(l)l.classList.remove('active');}}
  }
}

function advPhase(){
  var camp=getCamp(activeCampId);
  if(!camp)return;
  if(camp.phase<4){camp.phase++;save('campaigns',campaigns);updatePhaseDots(camp.phase);updatePhaseHeader(camp);}
}
function resetPhase(){
  if(!confirm('Reset phase back to the beginning?'))return;
  var camp=getCamp(activeCampId);
  if(!camp)return;
  camp.phase=0;save('campaigns',campaigns);updatePhaseDots(0);updatePhaseHeader(camp);
}
function togR(el){el.classList.toggle('done');}

function setDefaultLogDate(){
  var el=document.getElementById('log-date');
  if(!el)return;
  var t=new Date();
  el.value=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
}

function addLogEntry(){
  var camp=getCamp(activeCampId); if(!camp)return;
  var dateVal=document.getElementById('log-date').value;
  if(!dateVal){alert('Please enter a date.');return;}
  var impr=parseFloat(document.getElementById('log-impr').value)||0;
  var clicks=parseFloat(document.getElementById('log-clicks').value)||0;
  var spend=parseFloat(document.getElementById('log-spend').value)||0;
  var conv=parseFloat(document.getElementById('log-conv').value)||0;
  var dayNum=Math.floor((new Date(dateVal)-new Date(camp.resetDate))/864e5)+1;
  var sig,sigColor;
  if(!impr&&!spend){sig='No data';sigColor='#9ca3af';}
  else if(impr>=40&&conv>0){sig='Recovering';sigColor='#155e3e';}
  else if(impr>=20){sig='Warming';sigColor='#d97706';}
  else if(impr>0){sig='Still low';sigColor='#991b1b';}
  else{sig='No impressions';sigColor='#991b1b';}
  camp.logEntries.push({date:dateVal,day:dayNum,impr:impr,clicks:clicks,spend:spend,conv:conv,sig:sig,sigColor:sigColor});
  camp.logEntries.sort(function(a,b){return a.date.localeCompare(b.date);});
  save('campaigns',campaigns);
  ['log-impr','log-clicks','log-spend','log-conv'].forEach(function(id){var e=document.getElementById(id);if(e)e.value='';});
  var m=document.getElementById('log-msg');if(m){m.style.display='block';setTimeout(function(){m.style.display='none';},2000);}
  renderLogTable(camp);renderLogTotals(camp);
}

function removeLogEntry(idx){
  var camp=getCamp(activeCampId);if(!camp)return;
  camp.logEntries.splice(idx,1);save('campaigns',campaigns);
  renderLogTable(camp);renderLogTotals(camp);
}

function renderLogTable(camp){
  var tbody=document.getElementById('log-tbody');if(!tbody)return;
  if(!camp.logEntries||camp.logEntries.length===0){
    tbody.innerHTML='<tr><td colspan="8" style="padding:20px 10px;text-align:center;color:var(--muted);font-size:12px;font-style:italic;">No entries yet.</td></tr>';return;
  }
  tbody.innerHTML=camp.logEntries.map(function(e,i){
    var df=new Date(e.date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    var bg=i%2===1?'background:#faf9f7;':'';
    return'<tr style="'+bg+'"><td style="padding:9px 10px;font-weight:600;white-space:nowrap;">'+df+'</td>'
      +'<td style="padding:9px 10px;color:var(--muted);white-space:nowrap;">Day '+e.day+'</td>'
      +'<td style="padding:9px 10px;text-align:right;font-family:monospace;font-weight:700;">'+e.impr+'</td>'
      +'<td style="padding:9px 10px;text-align:right;font-family:monospace;font-weight:700;">'+e.clicks+'</td>'
      +'<td style="padding:9px 10px;text-align:right;font-family:monospace;font-weight:700;">$'+e.spend.toFixed(0)+'</td>'
      +'<td style="padding:9px 10px;text-align:right;font-family:monospace;font-weight:700;">'+e.conv+'</td>'
      +'<td style="padding:9px 10px;text-align:center;"><span style="font-size:10px;font-weight:700;color:'+e.sigColor+';">'+e.sig+'</span></td>'
      +'<td style="padding:9px 6px;text-align:center;"><button onclick="removeLogEntry('+i+')" style="font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 6px;">&#10005;</button></td></tr>';
  }).join('');
}

function renderLogTotals(camp){
  var el=document.getElementById('log-totals');if(!el)return;
  if(!camp.logEntries||camp.logEntries.length===0){el.style.display='none';return;}
  el.style.display='block';
  var ts=camp.logEntries.reduce(function(s,e){return s+e.spend;},0);
  var tc=camp.logEntries.reduce(function(s,e){return s+e.conv;},0);
  var ti=camp.logEntries.reduce(function(s,e){return s+e.impr;},0);
  var ai=Math.round(ti/camp.logEntries.length);
  var cpl=tc>0?(ts/tc):null;
  var tots=document.getElementById('tot-spend');if(tots)tots.textContent='$'+ts.toFixed(0);
  var totc=document.getElementById('tot-conv');if(totc)totc.textContent=tc;
  var toti=document.getElementById('tot-impr');if(toti)toti.textContent=ai;
  var totcpl=document.getElementById('tot-cpl');if(totcpl)totcpl.textContent=cpl?'$'+Math.round(cpl):'—';
  var ct=document.getElementById('tot-conv-tile');if(ct)ct.className='tile '+(tc>=5?'good':tc>=2?'warn':'neu');
  var it=document.getElementById('tot-impr-tile');if(it)it.className='tile '+(ai>=30?'good':ai>=10?'warn':'bad');
}

function getChicagoWeekKey(){
  var now = new Date();
  var chicago = new Date(now.toLocaleString('en-US', {timeZone: 'America/Chicago'}));
  var day = chicago.getDay();
  var monday = new Date(chicago);
  monday.setDate(chicago.getDate() - (day === 0 ? 6 : day - 1));
  return monday.toISOString().split('T')[0];
}


// ── NEGATIVE KEYWORD FUNCTIONS ───────────
var negPage = 0;
var NEG_PAGE_SIZE = 50;

function renderNG(camp, page){
  var el = document.getElementById('neg-list');
  if(!el) return;
  if(page !== undefined) negPage = page;
  var negs = camp.negatives || [];
  var cnt = document.getElementById('neg-count');
  var added = negs.filter(function(n){ return n.added; }).length;
  if(cnt) cnt.textContent = added + ' of ' + negs.length + ' added to Google Ads';
  if(!negs.length){
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">No negative keywords yet.</div>';
    var pg = document.getElementById('neg-pagination'); if(pg) pg.innerHTML = '';
    return;
  }
  var totalPages = Math.ceil(negs.length / NEG_PAGE_SIZE);
  if(negPage >= totalPages) negPage = totalPages - 1;
  var start = negPage * NEG_PAGE_SIZE;
  var pageNegs = negs.slice(start, start + NEG_PAGE_SIZE);
  var matchColors = {
    'Broad':  {bg:'#fef9c3',color:'#78350f'},
    'Phrase': {bg:'#eff4ff',color:'#1e3a8a'},
    'Exact':  {bg:'#f0faf5',color:'#155e3e'}
  };
  el.innerHTML = pageNegs.map(function(n, pi){
    var i = start + pi; // real index
    var mc = matchColors[n.match] || matchColors['Broad'];
    var badge = '<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;background:'+mc.bg+';color:'+mc.color+';white-space:nowrap;">'+(n.match||'Broad')+'</span>';
    return '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-lt);">'
      + '<input type="checkbox"'+(n.added?' checked':'')+' onchange="toggleNeg(getCamp(activeCampId),'+i+',this.checked)" style="width:16px;height:16px;cursor:pointer;accent-color:var(--gold);">'
      + '<span style="flex:1;font-size:13px;color:'+(n.added?'var(--muted)':'var(--stone)')+';font-family:monospace;'+(n.added?'text-decoration:line-through;':'')+'">'+n.text+'</span>'
      + badge
      + '<button onclick="removeNeg('+i+')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:2px 6px;">×</button>'
      + '</div>';
  }).join('');

  // Pagination controls
  var pg = document.getElementById('neg-pagination');
  if(pg){
    if(totalPages <= 1){ pg.innerHTML = ''; return; }
    var btns = '';
    var btnBase = 'padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--muted);';
    var btnActive = 'padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--stone);background:var(--stone);color:#fff;';
    btns += '<button style="'+btnBase+'" onclick="renderNG(getCamp(activeCampId),'+(negPage-1)+')" '+(negPage===0?'disabled':'')+'>&lsaquo; Prev</button>';
    for(var p = 0; p < totalPages; p++){
      btns += '<button style="'+(p===negPage?btnActive:btnBase)+'" onclick="renderNG(getCamp(activeCampId),'+p+')">'+(p+1)+'</button>';
    }
    btns += '<button style="'+btnBase+'" onclick="renderNG(getCamp(activeCampId),'+(negPage+1)+')" '+(negPage===totalPages-1?'disabled':'')+'>&rsaquo; Next</button>';
    btns += '<span style="font-size:11px;color:var(--muted);margin-left:6px;">Page '+(negPage+1)+' of '+totalPages+' &nbsp;('+negs.length+' total)</span>';
    pg.innerHTML = btns;
  }
}

function addNeg(){
  var camp = getCamp(activeCampId); if(!camp) return;
  var inp   = document.getElementById('neg-input');
  var match = document.getElementById('neg-match');
  var text  = inp ? inp.value.trim() : '';
  if(!text) return;
  if(!camp.negatives) camp.negatives = [];
  camp.negatives.push({text: text, match: match ? match.value : 'Broad', added: false});
  save('campaigns', campaigns);
  if(inp) inp.value = '';
  var m = document.getElementById('neg-saved');
  if(m){ m.style.display='inline'; setTimeout(function(){ m.style.display='none'; }, 2000); }
  renderNG(camp);
}

function addNegBulk(){
  var camp = getCamp(activeCampId); if(!camp) return;
  var ta = document.getElementById('neg-bulk-input');
  if(!ta || !ta.value.trim()) return;
  var lines = ta.value.split('\n');
  if(!camp.negatives) camp.negatives = [];
  var added = 0;
  lines.forEach(function(line){
    var raw = line.trim();
    if(!raw) return;
    var match = 'Broad';
    var text = raw;
    // Detect [exact] format
    if(/^\[.+\]$/.test(raw)){
      match = 'Exact';
      text = raw.slice(1, -1).trim();
    // Detect "phrase" format
    } else if(/^".+"$/.test(raw)){
      match = 'Phrase';
      text = raw.slice(1, -1).trim();
    }
    if(!text) return;
    // Skip duplicates
    var exists = camp.negatives.some(function(n){ return n.text.toLowerCase() === text.toLowerCase(); });
    if(exists) return;
    camp.negatives.push({text: text, match: match, added: false});
    added++;
  });
  save('campaigns', campaigns);
  ta.value = '';
  var countEl = document.getElementById('neg-bulk-count');
  if(countEl) countEl.textContent = added + ' keyword' + (added === 1 ? '' : 's') + ' imported';
  var m = document.getElementById('neg-bulk-saved');
  if(m){ m.style.display='inline'; setTimeout(function(){ m.style.display='none'; }, 2500); }
  renderNG(camp);
}

function removeNeg(idx){
  var camp = getCamp(activeCampId); if(!camp) return;
  camp.negatives.splice(idx, 1);
  save('campaigns', campaigns);
  // If removing last item on a page, go back one page
  var totalPages = Math.ceil((camp.negatives.length) / NEG_PAGE_SIZE);
  if(negPage >= totalPages && negPage > 0) negPage--;
  renderNG(camp);
}

function toggleNeg(camp, idx, checked){
  if(!camp || !camp.negatives || !camp.negatives[idx]) return;
  camp.negatives[idx].added = checked;
  save('campaigns', campaigns);
  renderNG(camp);
}

function copyNegs(){
  var camp = getCamp(activeCampId); if(!camp) return;
  var text = (camp.negatives||[]).map(function(n){
    var m = n.match || 'Broad';
    if(m === 'Phrase') return '"' + n.text + '"';
    if(m === 'Exact')  return '[' + n.text + ']';
    return n.text; // Broad — no brackets
  }).join('\n');
  navigator.clipboard.writeText(text).then(function(){
    var btn = document.getElementById('neg-copy-btn');
    if(btn){ var orig=btn.textContent; btn.textContent='Copied!'; setTimeout(function(){ btn.textContent=orig; }, 2000); }
  });
}

    'Result':      {bg:'#fefce8',color:'#854d0e'},
    'Change':      {bg:'#fff1f2',color:'#9f1239'}
  };
  list.innerHTML = entries.map(function(e, ri){

  // Header row
  rows.push([
    'Campaign', 'Date', 'Impressions', 'Clicks', 'Spend ($)',
    'Leads', 'CPL ($)', 'CPC ($)', 'CTR (%)', 'Impression Share (%)',
    'Quality Score', 'G.Conv'
  ].join(','));

  // One row per perfLog entry per campaign
  campaigns.forEach(function(camp) {
    var log = (camp.perfLog || []).slice().sort(function(a,b){
      return a.date.localeCompare(b.date);
    });
    log.forEach(function(e) {
      var cpl  = e.leads > 0 ? (e.spend / e.leads).toFixed(2) : '';
      var cpc  = e.clicks > 0 ? (e.spend / e.clicks).toFixed(2) : (e.cpc || '');
      var ctr  = e.ctr != null ? e.ctr.toFixed(2)
               : (e.impr > 0 && e.clicks > 0 ? (e.clicks / e.impr * 100).toFixed(2) : '');
      var is   = e.is  != null ? e.is  : '';
      var qs   = e.qs  != null ? e.qs  : '';
      var gc   = e.gconv != null ? e.gconv : '';
      rows.push([
        '"' + (camp.name || '').replace(/"/g, '""') + '"',
        e.date,
        e.impr   || 0,
        e.clicks || 0,
        (e.spend  || 0).toFixed(2),
        e.leads  || 0,
        cpl,
        cpc,
        ctr,
        is,
        qs,
        gc
      ].join(','));
    });
  });

  if(rows.length <= 1) {
    alert('No performance data to export yet. Add daily entries first.');
    return;
  }

  var csv   = rows.join('\n');
  var blob  = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url   = URL.createObjectURL(blob);
  var link  = document.createElement('a');
  var today = new Date().toISOString().slice(0, 10);
  link.setAttribute('href', url);
  link.setAttribute('download', 'KCH_Ads_Export_' + today + '.csv');
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

// ── BOOT ─────────────────────────────────
showHome();

</script>
</body>
</html>
